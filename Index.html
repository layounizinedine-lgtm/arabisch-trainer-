<style>
:root{--bg:#080c14;--bg2:#0d1526;--bg3:#1a2540;--border:#1e2d4a;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--gold:#F59E0B;--gold2:#d97706}
[data-theme="light"]{--bg:#ffffff;--bg2:#f9f9f9;--bg3:#f0f0f0;--border:#e0e0e0;--text:#111111;--text2:#222222;--text3:#444444;--gold:#c9a227;--gold2:#a3811f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;width:100%;margin:0 auto;min-height:100vh;transition:background 0.3s,color 0.3s}
.ar{font-family:'Noto Naskh Arabic',serif;direction:rtl;text-align:right}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px}
.gold-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:14px;color:#080c14;font-weight:800;font-size:15px;padding:14px 0;width:100%;cursor:pointer;font-family:'Inter',sans-serif}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-size:14px;width:100%;box-sizing:border-box;font-family:'Inter',sans-serif;outline:none}
#app{padding-bottom:90px;min-height:100vh}
#topbar{height:3px;background:linear-gradient(90deg,#F59E0B,#d97706,#92400e,#F59E0B);position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;width:100%;z-index:99}
#navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:50;backdrop-filter:blur(10px)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding:24px;max-height:90vh;overflow-y:auto}
.quick-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:transform 0.1s,border-color 0.2s;-webkit-tap-highlight-color:transparent}
.quick-card:active{transform:scale(0.97)}
</style>
</head>

let streak = JSON.parse(localStorage.getItem('streak_v4')||'{"days":0,"lastDate":"","longest":0,"todayXP":0,"totalXP":0}');
let stats = JSON.parse(localStorage.getItem('stats_v1')||'{"learned":0,"reviewed":0,"sessions":0}');

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(streak.lastDate===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yk=y.toISOString().slice(0,10);
  streak.days = streak.lastDate===yk ? streak.days+1 : 1;
  streak.lastDate=today; streak.longest=Math.max(streak.longest,streak.days); streak.todayXP=0;
  try{localStorage.setItem('streak_v4',JSON.stringify(streak))}catch{}
}
function addXP(n){
  streak.todayXP=(streak.todayXP||0)+n;
  streak.totalXP=(streak.totalXP||0)+n;
  try{localStorage.setItem('streak_v4',JSON.stringify(streak))}catch{}
  // Track daily review count for heatmap
  try{
    const today=new Date().toISOString().slice(0,10);
    const h=JSON.parse(localStorage.getItem('reviewHistory')||'{}');
    h[today]=(h[today]||0)+1;
    localStorage.setItem('reviewHistory',JSON.stringify(h));
  }catch{}
}
updateStreak();

function isDue(c){ return !c.nextReview||Date.now()>=c.nextReview; }
function calcNext(card,score){
  let {interval=1,easeFactor=2.5,repetitions=0,failCount=0}=card, fc=failCount;
  if(score<3){repetitions=0;fc=Math.min(failCount+1,5);interval=1;}
  else{fc=Math.max(0,failCount-1);interval=repetitions===0?1:repetitions===1?6:Math.round(interval*easeFactor);repetitions++;}
  easeFactor=Math.max(1.3,easeFactor+0.1-(5-score)*(0.08+(5-score)*0.02));
  const pf=fc>0?Math.max(0.3,1-fc*0.15):1;
  const ai=score<3?interval:Math.max(1,Math.round(interval*pf));
  return{...card,interval:ai,easeFactor,repetitions,nextReview:Date.now()+ai*86400000,status:score>=4?'gelernt':score>=2?'lernend':'neu',lastScore:score,failCount:fc};
}
function buildPool(vocab,f){
  const base=vocab.filter(v=>f==='fällig'?isDue(v):f==='alle'?true:v.status===f);
  const pool=[];
  for(const c of base){const fc=c.failCount||0,t=fc>=4?4:fc>=3?3:fc>=2?2:1;for(let i=0;i<t;i++)pool.push(c);}
  return pool.sort(()=>Math.random()-0.5);
}

async function callAI(prompt,maxTokens=1500){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':window._ak||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
  if(d.content&&d.content[0]&&d.content[0].text) return d.content[0].text;
  throw new Error('Unerwartete API-Antwort: '+JSON.stringify(d).slice(0,200));
}
function pJ(text){
  const c=text.replace(/```json|```/g,'').trim();
  // Determine intended type by first non-whitespace character
  const firstChar=c.trim()[0];
  const tryParse=(s,e)=>{
    const start=c.indexOf(s), end=c.lastIndexOf(e);
    if(start===-1||end===-1||end<=start) return null;
    try{ return JSON.parse(c.slice(start,end+1)); }catch(e){ return null; }
  };
  if(firstChar==='['){
    return tryParse('[',']') || tryParse('{','}');
  }
  return tryParse('{','}') || tryParse('[',']');
}

function renderVokabeln(app){
  const vocab=getVocab();
  const due=vocab.filter(isDue).length;
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:6px">

      <div><div style="font-size:11px;color:var(--text3)">LERNEN</div><div style="font-size:20px;font-weight:800;color:var(--text)">${ui('vocab')}</div></div>
      <button onclick="showAddVocab()" class="gold-btn" style="width:auto;padding:8px 16px;margin-left:auto;font-size:13px">+ Hinzufügen</button>
    </div>
    ${due>0?`<div onclick="subView='karten';render()" style="background:linear-gradient(135deg,#1a2f1a,#0d1a0d);border:1px solid #22c55e;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer"><div><div style="font-size:13px;font-weight:700;color:#4ade80">${due} ${ui('reviews')} fällig</div><div style="font-size:11px;color:var(--text3)">Tippe um zu lernen</div></div><div style="font-size:24px;font-weight:800;color:#4ade80">${due}</div></div>`:''}
    <input placeholder="🔍 Suchen..." oninput="filterVocab(this.value)" style="margin-bottom:14px"/>

  </div>`;
}

function vocabCard(v){
  const tr=getTr(v), exTr=getExTr(v);
  const sc=v.status==='gelernt'?'#4ade80':v.status==='lernend'?'#60a5fa':'var(--text3)';
  const sb=v.status==='gelernt'?'#14532d':v.status==='lernend'?'#1e3a5f':'var(--bg3)';
  const isAdj=(v.wordType||'').toLowerCase().includes('adj');
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3)">${v.wordType||''}</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-top:2px">${tr}</div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">مفرد</div><div class="ar" style="font-size:28px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div></div>
          ${v.plural&&v.plural!=='-'?`<div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">جمع</div><div class="ar" style="font-size:28px;color:#a78bfa;font-weight:700">${v.pluralHarakat||v.plural}</div></div>`:''}
          ${isAdj&&v.opposite&&v.opposite!==''?`<div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">ضد</div><div class="ar" style="font-size:28px;color:#60a5fa;font-weight:700">${v.oppHarakat||v.opposite}</div></div>`:''}
        </div>
        ${v.exampleArabic?`<div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:10px"><div class="ar" style="font-size:16px;color:var(--text);line-height:1.9">${v.exampleArabic}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${exTr}</div></div>`:''}
        <button onclick="showVocabMehr(${v.id})" style="margin-top:10px;background:none;border:1px solid #3b2d6e;border-radius:10px;padding:8px 14px;color:#a78bfa;font-size:12px;font-weight:700;cursor:pointer;width:100%">Kontext & Mehr anzeigen</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <span style="background:${sb};color:${sc};border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700">${ui('status_'+v.status)||v.status||'neu'}</span>
        <button onclick="deleteVocab(${v.id})" style="background:#3b1a1a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer">Löschen</button>
      </div>
    </div>
  </div>`;
}

async function showVocabMehr(id){
  const v=getVocab().find(x=>x.id===id); if(!v)return;
  const m=document.createElement('div'); m.className='overlay';
  const renderData=(p)=>{
    return `<div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:12px;text-align:left">BEDEUTUNGEN & KONTEXT</div>
      ${(p.bedeutungen||[]).map(b=>`<div style="background:var(--bg3);border:1px solid #3b2d6e;border-radius:14px;padding:14px;margin-bottom:10px;text-align:left">
        <div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:6px">${b.kontext}</div>
        <div class="ar" style="font-size:20px;color:var(--gold);margin-bottom:4px">${b.arabisch}</div>
        <div style="font-size:12px;color:var(--text3)">${b.deutsch}</div>
        ${b.beispiel?`<div class="ar" style="font-size:13px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.8">${b.beispiel}</div>`:''}
      </div>`).join('')}
      ${(p.verwandte||[]).length?`<div style="font-size:12px;font-weight:700;color:var(--text);margin:16px 0 10px;text-align:left">VERWANDTE WÖRTER (نفس الجذر)</div>
      ${p.verwandte.map(w=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;color:var(--text2)">${w.deutsch}</div><div style="font-size:11px;color:var(--text3)">${w.wortart}</div></div>
        <div class="ar" style="font-size:22px;color:#60a5fa;font-weight:700">${w.arabisch}</div>
      </div>`).join('')}`:''}`;
  };
  if(v.mehrData){
    m.innerHTML=`<div class="sheet" style="max-height:85vh">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div><div style="font-size:13px;color:var(--text3)">${getTr(v)}</div></div>
        <button onclick="this.closest('.overlay').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px">✕</button>
      </div>
      <div style="text-align:left">${renderData(v.mehrData)}</div>
    </div>`;
    document.body.appendChild(m);
    return;
  }
  m.innerHTML=`<div class="sheet" style="max-height:85vh">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div><div style="font-size:13px;color:var(--text3)">${getTr(v)}</div></div>
      <button onclick="this.closest('.overlay').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div id="vocabMehrContent" style="text-align:center;padding:20px;color:var(--text3)">
      <div style="font-size:13px;margin-bottom:20px">Lade Kontext für <span class="ar" style="color:var(--gold)">${v.arabic}</span>...</div>
      <div style="font-size:24px">⏳</div>
    </div>
  </div>`;
  document.body.appendChild(m);
  try{
    const raw=await callAI(`For Arabic word "${v.arabic}" (${getTr(v)}): meanings in different contexts and related words from same root. Be concise - max 3 bedeutungen, max 4 verwandte. ONLY JSON, no markdown fences:
{"bedeutungen":[{"kontext":"context label","arabisch":"with diacritics","deutsch":"meaning","beispiel":"example with diacritics"}],"verwandte":[{"arabisch":"with diacritics","deutsch":"meaning","wortart":"Nomen/Verb/Adjektiv"}]}`,1500);
    const p=pJ(raw);
    const el=document.getElementById('vocabMehrContent');
    if(p&&el){
      el.style.textAlign='left';
      el.innerHTML=renderData(p);
    } else if(el){ el.innerHTML='<div style="color:#ef4444">KI Fehler.</div>'; }
  }catch(e){
    const el=document.getElementById('vocabMehrContent');
    if(el) el.innerHTML=`<div style="color:#ef4444">Fehler: ${e.message}</div>`;
  }
}

function filterVocab(q){
  const vocab=getVocab();
  const filtered=vocab.filter(v=>v.arabic.includes(q)||getTr(v).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('vocabList').innerHTML=filtered.map(v=>vocabCard(v)).join('');
}
function deleteVocab(id){ setVocab(getVocab().filter(v=>v.id!==id)); renderVokabeln(document.getElementById('app')); }

function showAddVocab(){
  const m=document.createElement('div'); m.className='overlay';

    <input id="arIn" placeholder="Arabisches Wort..." class="ar" style="font-size:22px;margin-bottom:10px;color:var(--gold)"/>

}

async function addVocab(){
  const ar=document.getElementById('arIn').value.trim();
  const tr=document.getElementById('trIn').value.trim();
  if(!ar)return;
  const btn=document.getElementById('addVBtn');
  btn.textContent='KI ergänzt...'; btn.disabled=true;
  try{
    const raw=await callAI(`For Arabic word "${ar}" (hint: "${tr||'translate'}"): Reply ONLY with JSON:
{"arabic":"${ar}","harakat":"word with FULL diacritics including tanwin e.g. كِتَابٌ","translations":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"},"wordType":"Nomen/Verb/Adjektiv/etc","opposite":"Arabic opposite WITH diacritics only if Adjektiv else empty string","oppHarakat":"opposite with diacritics or empty","plural":"Arabic plural WITH diacritics or -","pluralHarakat":"plural with diacritics or -","exampleArabic":"example sentence with FULL diacritics","exampleTranslation":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"}}`);
    const p=pJ(raw);
    if(p){ setVocab([{...p,id:Date.now(),status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},...getVocab()]); document.querySelector('.overlay').remove(); addXP(5); renderVokabeln(document.getElementById('app')); }
    else{alert('KI Fehler');btn.textContent='Karte erstellen';btn.disabled=false;}
  }catch(e){alert('Fehler: '+e.message);btn.textContent='Karte erstellen';btn.disabled=false;}
}

// ── KARTEN (Spaced Repetition) ────────────────────────────────────────────────
let lP=[],lI=0,lF=false,lS={p:0,g:0,s:0},lD=false,lFilter='fällig';
const RATES=[{l:ui('never'),c:'#ef4444',s:0},{l:ui('ok'),c:'#eab308',s:2},{l:ui('perfect'),c:'#a3e635',s:5}];

function renderKarten(app){
  lP=buildPool(getVocab(),lFilter); lI=0; lF=false; lS={p:0,g:0,s:0}; lD=false;
  showCard(app);
}
function showCard(app){
  const fb=['fällig','alle','neu','lernend','gelernt'].map(f=>`<button onclick="lFilter='${f}';renderKarten(document.getElementById('app'))" style="background:${lFilter===f?'var(--gold)':'var(--bg3)'};border:1px solid ${lFilter===f?'var(--gold)':'var(--border)'};color:${lFilter===f?'#080c14':'var(--text2)'};border-radius:10px;padding:6px 10px;font-weight:700;font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('');
  if(lD){
    app.innerHTML=`<div style="padding:20px 16px 100px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Session abgeschlossen! 🏆</div></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">${[['Perfekt','p','#a3e635'],['Gut','g','#F59E0B'],['Schlecht','s','#ef4444']].map(([l,k,c])=>`<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:900;color:${c}">${lS[k]}</div><div style="font-size:11px;color:var(--text3)">${l}</div></div>`).join('')}</div>
    ${lS.s>0?`<div style="background:#1a1000;border:1px solid #92400e;border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--gold)">${ui('badCards')||'Schlechte Karten kommen öfter wieder.'}</div>`:''}
    <button class="gold-btn" onclick="renderKarten(document.getElementById('app'))">${ui('playAgain')}</button></div>`; return;
  }
  if(!lP.length){
    app.innerHTML=`<div style="padding:20px 16px 100px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Lernkarten</div></div>
    <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${fb}</div>
    <div style="text-align:center;color:var(--text3);padding:60px 0;font-size:15px">${ui('noCards')||'Keine Karten.'}</div></div>`; return;
  }
  const card=lP[lI];
  const tr=getTr(card), exTr=getExTr(card);
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:6px">
      <button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button>
      <div style="font-size:20px;font-weight:800;color:var(--text)">Lernkarten</div>
      <div style="font-size:13px;font-weight:700;color:var(--gold);margin-left:auto">${lI+1}/${lP.length}</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">${fb}</div>
    <div style="background:var(--bg3);border-radius:4px;height:4px;margin-bottom:16px"><div style="width:${((lI+1)/lP.length)*100}%;background:${(card.failCount||0)>1?'#ef4444':'var(--gold)'};height:4px;border-radius:4px;transition:width 0.4s"></div></div>
    <div onclick="lF=!lF;showCard(document.getElementById('app'))" style="background:var(--bg2);border:1px solid ${(card.failCount||0)>1?'#7f1d1d':'var(--border)'};border-radius:20px;padding:24px;min-height:260px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;margin-bottom:14px">
      ${!lF?`${(card.failCount||0)>0?`<div style="font-size:10px;color:#f97316;margin-bottom:10px;font-weight:700">SCHWIERIG – ${card.failCount}x falsch</div>`:''}
      <div style="font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:18px">${ui('tapToFlip')}</div>
      <div class="ar" style="font-size:58px;color:var(--gold);font-weight:700;line-height:1.4;margin-bottom:10px">${card.harakat||card.arabic}</div>
      <div style="font-size:12px;color:var(--text3)">${card.wordType||''}</div>`
      :`<div style="width:100%">
        <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:18px">${tr}</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
          ${card.plural&&card.plural!=='-'?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">جمع</div><div class="ar" style="font-size:20px;color:#a78bfa">${card.pluralHarakat||card.plural}</div></div>`:''}
          ${(card.wordType||'').toLowerCase().includes('adj')&&card.opposite&&card.opposite!==''?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">ضد</div><div class="ar" style="font-size:20px;color:#60a5fa">${card.oppHarakat||card.opposite}</div></div>`:''}
        </div>
        ${card.exampleArabic?`<div style="background:var(--bg3);border-radius:12px;padding:14px"><div class="ar" style="font-size:18px;color:var(--text);line-height:2;margin-bottom:6px">${card.exampleArabic}</div><div style="font-size:12px;color:var(--text3)">${exTr}</div></div>`:''}</div>`}
    </div>
    ${lF?`<div><div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px">${ui('howWell')}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">${RATES.map(r=>`<button onclick="rateCard(${r.s})" style="background:var(--bg2);border:1px solid ${r.c}44;border-radius:14px;padding:14px 6px;cursor:pointer;text-align:center"><div style="font-size:14px;font-weight:800;color:${r.c}">${r.l}</div>${r.s<2?'<div style="font-size:9px;color:var(--text3);margin-top:2px">öfter</div>':r.s>=4?'<div style="font-size:9px;color:var(--text3);margin-top:2px">seltener</div>':''}</button>`).join('')}</div>
    <button onclick="lF=false;lI++;if(lI>=lP.length){lD=true;}showCard(document.getElementById('app'))" style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;width:100%;color:var(--text2);font-weight:700;cursor:pointer">${ui('skip')}</button></div>`:''}`
}
function rateCard(score){
  const card=lP[lI];
  const updated=calcNext(card,score);
  setVocab(getVocab().map(v=>v.id===card.id?updated:v));
  if(score>=4)lS.p++;else if(score>=2)lS.g++;else lS.s++;
  addXP(score>=4?10:score>=2?5:2);
  lI++; lF=false;
  if(lI>=lP.length){lD=true;updateStreak();}
  showCard(document.getElementById('app'));
}

function showVerbDetail(id){
  const verb=getVerbs().find(v=>v.id===id); if(!verb)return;
  // Only reset tense when opening a NEW verb, not when switching tabs
  if(window._verbDetailId !== id){
    window._vt=activeTense;
    // Use pre-built mehrData if available (no AI call needed), else null for on-demand load
    window._mehrData=verb.mehrData||null;
    window._mehrLoading=false;
    window._mehrError=null;
  }
  window._verbDetailId=id;

  function draw(){
  const vt=window._vt;
  const mehrData=window._mehrData;
  const mehrLoading=window._mehrLoading;
    const tc=TENSES.find(x=>x.key===vt)||TENSES[0];
    const existing=document.getElementById('verbModal'); if(existing)existing.remove();
    const m=document.createElement('div'); m.id='verbModal';
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:150;display:flex;flex-direction:column;overflow:hidden';
    m.innerHTML=`
    <div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div><div style="font-size:11px;color:var(--text3)">VERB</div><div class="ar" style="font-size:26px;color:var(--gold);font-weight:700">${verb.arabic}</div><div style="font-size:13px;color:var(--text2)">${getTr(verb)}</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div onclick="window._vt='mehr';showVerbDetail(window._verbDetailId)" style="background:${vt==='mehr'?'#a78bfa':'var(--bg3)'};border:none;color:${vt==='mehr'?'white':'var(--text2)'};border-radius:10px;padding:8px 12px;cursor:pointer;font-size:14px;font-weight:700">···</div>
        <div onclick="document.getElementById('verbModal').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:16px">✕</div>
      </div>
    </div>
    ${vt!=='mehr'?`<div style="display:flex;gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto">
      ${TENSES.map(tn=>`<div onclick="window._vt='${tn.key}';showVerbDetail(window._verbDetailId)" style="flex-shrink:0;padding:10px 16px;border-radius:20px;cursor:pointer;background:${vt===tn.key?tn.color+'33':'var(--bg3)'};border:2px solid ${vt===tn.key?tn.color:'transparent'};-webkit-tap-highlight-color:transparent">
        <div style="font-size:12px;font-weight:700;color:${vt===tn.key?tn.color:'var(--text3)'};white-space:nowrap">${tn.label}</div>

      </div>`).join('')}
    </div>`:''}
    <div style="flex:1;overflow-y:auto;padding:16px">
      ${vt==='mehr'?renderMehrContent():renderTenseContent(tc,verb)}
    </div>`;
    document.body.appendChild(m);
  }

  function renderTenseContent(tc,verb){
    const vt=window._vt;
    const ORDER_N=['هُوَ','هُمَا','هُمْ','هِيَ','هُمَا','هُنَّ','أَنْتَ','أَنْتُمَا','أَنْتُمْ','أَنْتِ','أَنْتُمَا','أَنْتُنَّ','أَنَا','نَحْنُ'];
    const ORDER_B=['أَنْتَ','أَنْتُمَا','أَنْتُمْ','أَنْتِ','أَنْتُنَّ'];
    const ORDER=vt==='befehl'?ORDER_B:ORDER_N;
    const raw=(verb.konjugation&&verb.konjugation[vt])||[];
    const strip=s=>(s||'').replace(/[\u064B-\u065F\u0670]/g,'').trim();
    const usedIdx=new Set();
    const sorted=raw.map(f=>{
      let bestI=-1;
      for(let i=0;i<ORDER.length;i++){
        if(!usedIdx.has(i) && strip(ORDER[i])===strip(f.p)){ bestI=i; break; }
      }
      if(bestI===-1) bestI=999;
      usedIdx.add(bestI);
      return {f,idx:bestI};
    }).sort((a,b)=>a.idx-b.idx).map(x=>x.f);
    return `<div style="font-size:12px;font-weight:700;color:${tc.color};margin-bottom:12px">${tc.label}</div>
    ${sorted.map(f=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:11px;color:var(--text3)">${f.p} · ${f.d}</div>
      <div class="ar" style="font-size:26px;color:${tc.color};font-weight:700">${f.a}</div>
    </div>`).join('')}
    ${verb.konjugation&&verb.konjugation.beispiele&&verb.konjugation.beispiele.length?`<div style="font-size:12px;font-weight:700;color:var(--text);margin:20px 0 10px">BEISPIELSÄTZE</div>${verb.konjugation.beispiele.map(b=>`<div class='card'><div class="ar" style="font-size:18px;color:var(--text);line-height:1.9;margin-bottom:6px">${b.a}</div><div style="font-size:12px;color:var(--text3)">${b.d}</div></div>`).join('')}`:''}
    ${verb.konjugation&&verb.konjugation.merksatz?`<div style="background:linear-gradient(135deg,#1a1f3a,#0d1226);border:1px solid #2d3a6e;border-radius:14px;padding:16px;margin-top:16px"><div style="font-size:12px;font-weight:700;color:#60a5fa;margin-bottom:8px">WORTSTAMM & MERKHILFE</div><div style="font-size:13px;color:#93c5fd;line-height:1.6">${verb.konjugation.merksatz}</div></div>`:''}`;
  }

  function renderMehrContent(){
    const mehrLoading=window._mehrLoading;
    const mehrData=window._mehrData;
    const mehrError=window._mehrError;
    if(mehrLoading) return `<div style="text-align:center;padding:40px;color:var(--text3)">KI lädt Kontext-Bedeutungen...</div>`;
    if(mehrError) return `<div style="text-align:center;padding:40px">
      <div style="font-size:13px;color:#fca5a5;margin-bottom:16px">${mehrError}</div>
      <button onclick="window._mehrError=null;loadMehr()" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:12px;padding:14px 24px;color:white;font-weight:700;font-size:14px;cursor:pointer">Nochmal versuchen</button>
    </div>`;
    if(!mehrData) return `<div style="text-align:center;padding:40px">
      <div style="font-size:14px;color:var(--text3);margin-bottom:16px">Entdecke alle Bedeutungen und Kontexte von <span class="ar" style="color:var(--gold);font-size:18px">${verb.arabic}</span></div>
      <button onclick="loadMehr()" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:12px;padding:14px 24px;color:white;font-weight:700;font-size:14px;cursor:pointer">Kontext laden</button>
    </div>`;
    return `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:12px">BEDEUTUNGEN & KONTEXT</div>
      ${(mehrData.bedeutungen||[]).map(b=>`<div style="background:var(--bg2);border:1px solid #3b2d6e;border-radius:14px;padding:14px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:#a78bfa;margin-bottom:6px">${b.kontext}</div>
        <div class="ar" style="font-size:20px;color:var(--gold);margin-bottom:4px">${b.arabisch}</div>
        <div style="font-size:12px;color:var(--text3)">${b.deutsch}</div>
        ${b.beispiel?`<div class="ar" style="font-size:14px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${b.beispiel}</div>`:''}
      </div>`).join('')||''}
      ${mehrData.verwandte&&mehrData.verwandte.length?`<div style="font-size:12px;font-weight:700;color:var(--text);margin:16px 0 10px">VERWANDTE WÖRTER (نفس الجذر)</div>
      ${mehrData.verwandte.map(w=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;color:var(--text3)">${w.deutsch}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${w.wortart}</div></div>
        <div class="ar" style="font-size:22px;color:#60a5fa;font-weight:700">${w.arabisch}</div>
      </div>`).join('')}`:''}
    </div>`;
  }

  async function loadMehr(){
    window._mehrLoading=true;
    if(window._draw)window._draw();
    try{
      const raw=await callAI(`For the Arabic verb "${verb.arabic}" (${getTr(verb)}): Give meanings in different contexts and related words from the same root. Be CONCISE - max 3 bedeutungen entries and max 4 verwandte entries. Respond with ONLY a single JSON object, no markdown code fences, no other text, in exactly this format:
{"bedeutungen":[{"kontext":"short German label","arabisch":"short phrase with full diacritics","deutsch":"short German meaning","beispiel":"short example sentence with full diacritics"}],"verwandte":[{"arabisch":"related word with full diacritics","deutsch":"short German meaning","wortart":"Nomen or Adjektiv etc"}]}`,2000);
      const p=pJ(raw);
      if(p && (p.bedeutungen || p.verwandte)){ window._mehrData=p; window._mehrLoading=false; if(window._draw)window._draw(); }
      else { window._mehrLoading=false; window._mehrError='Antwort: '+raw.slice(0,300); if(window._draw)window._draw(); }
    }catch(e){ window._mehrLoading=false; window._mehrError='Fehler: '+e.message; if(window._draw)window._draw(); }
  }

  function showMehr(){ window._vt='mehr'; window._mehrData=verb.mehrData||window._mehrData; draw(); if(!window._mehrData&&!window._mehrLoading) loadMehr(); }
  window._draw=draw; window.loadMehr=loadMehr; window.showMehr=showMehr;
  draw();
}

}

async function startGame(mode){
  gMode=mode;gI=0;gScore=0;gDone=false;gResult=null;gAns='';
  const vocab=getVocab();
  if(vocab.length<4){alert('Mindestens 4 '+ui('vocab')+' nötig!');gMode=null;renderSpiele(document.getElementById('app'));return;}
  renderSpiele(document.getElementById('app'));
  const sh=arr=>[...arr].sort(()=>Math.random()-0.5);

  if(['mc','ar2tr','tr2ar','hoeren','schnell','plural','wortart'].includes(mode)){
    gQ=sh(vocab).slice(0,10);
    if(mode==='mc'||mode==='hoeren'||mode==='paare')buildMC(0);
    if(mode==='hoeren'){ setTimeout(()=>speakAr(gQ[0].harakat||gQ[0].arabic),400); }
  } else if(mode==='paare'){
    gQ=sh(vocab).slice(0,6); buildMC(0);
  } else if(['saetze','luecke','kontext'].includes(mode)){
    try{
      const wl=sh(vocab).slice(0,6).map(v=>`${v.arabic} (${getTr(v)})`).join(', ');
      let prompt='';
      if(mode==='saetze') prompt=`Create 8 simple translation exercises (max 5 words) using: ${wl}. Alternate Arabic→${LANGS[lang].name} and ${LANGS[lang].name}→Arabic. ONLY JSON: [{"aufgabe":"sentence","dir":"ar2tr or tr2ar","loesung":"translation","hinweis":"hint"}]`;
      else if(mode==='luecke') prompt=`Create 8 fill-in-the-blank exercises using these Arabic words: ${wl}. Show an Arabic sentence with one word replaced by ___. User must type the missing word. ONLY JSON: [{"aufgabe":"Arabic sentence with ___","loesung":"the missing Arabic word with diacritics","hinweis":"hint: ${LANGS[lang].name} meaning","dir":"luecke"}]`;
      else if(mode==='kontext') prompt=`Create 8 context exercises: show an Arabic sentence, ask which word from a list fits best. Use words: ${wl}. ONLY JSON: [{"aufgabe":"Arabic sentence with blank","optionen":["word1","word2","word3","word4"],"loesung":"correct word with diacritics","hinweis":"context hint"}]`;
      const raw=await callAI(prompt,1500);
      const p=pJ(raw);
      if(Array.isArray(p)&&p.length>0){gQ=p;renderSpiele(document.getElementById('app'));}
      else{alert('KI Fehler');gMode=null;renderSpiele(document.getElementById('app'));}
    }catch{alert('KI Fehler');gMode=null;renderSpiele(document.getElementById('app'));}
  }
  renderSpiele(document.getElementById('app'));
}
// Strip Arabic diacritics for comparison
function stripH(s){return String(s).replace(/[ً-ٰٟ]/g,'').trim();}

function buildMC(idx){const vocab=getVocab();const c=gQ[idx];const w=[...vocab].sort(()=>Math.random()-0.5).filter(v=>v.id!==c.id).slice(0,3);gMC=[...[c,...w]].sort(()=>Math.random()-0.5);}
function checkGame(given){
  const q=gQ[gI]; const qTr=getTr(q)||''; let ok=false;
  const g=String(given).trim(); const gS=stripH(g); // gS = without harakat
  if(gMode==='mc')ok=given===q.id;
  else if(gMode==='hoeren')ok=given===q.id;
  else if(gMode==='ar2tr'||gMode==='schnell')ok=g.toLowerCase().includes(qTr.toLowerCase().split(',')[0].trim().slice(0,4));
  else if(gMode==='tr2ar'){const a=stripH(q.arabic);ok=gS===a||gS===stripH(q.harakat||q.arabic)||a.includes(gS);}
  else if(gMode==='plural'){const pl=stripH(q.plural||'');ok=gS===pl||gS===stripH(q.pluralHarakat||q.plural||'');}
  else if(gMode==='wortart')ok=g.toLowerCase().includes((q.wordType||'').toLowerCase().slice(0,4));
  else if(gMode==='saetze'){const l=q.loesung.toLowerCase();ok=g.toLowerCase().length>2&&(l.includes(g.toLowerCase().slice(0,4))||g.toLowerCase().includes(l.slice(0,4)));}
  else if(gMode==='luecke'){const sol=stripH(q.loesung||'');ok=gS===sol||sol.startsWith(gS.slice(0,4));}
  else if(gMode==='kontext'){const sol=stripH(q.loesung||'');ok=gS===sol||sol.startsWith(gS.slice(0,3));}
  else if(gMode==='harakat'){ok=g===q.loesung;} // exact match needed for harakat game
  gResult=ok?'correct':'wrong'; if(ok){gScore++;addXP(10);}
  renderSpiele(document.getElementById('app'));
}
function nextGame(){gI++;gResult=null;gAns='';if(gI>=gQ.length){gDone=true;}else if(gMode==='mc')buildMC(gI);renderSpiele(document.getElementById('app'));}

  app.innerHTML=`<div style="padding:20px 16px 100px">

    </div>

      <textarea id="corrIn" placeholder="أكتب نصك هنا..." class="ar" style="font-size:22px;height:120px;resize:none;line-height:1.8"></textarea>
      <button class="gold-btn" style="margin-top:12px" onclick="correctText()" id="corrBtn">${ui('correctBtn')}</button>
    </div>

    <div class="card"><div style="font-size:11px;color:#4ade80;margin-bottom:8px;font-weight:700">KORRIGIERTER TEXT</div><div class="ar" style="font-size:22px;color:var(--text);line-height:1.9">${cResult.corrected}</div></div>
    ${cResult.corrections&&cResult.corrections.length?`<div class="card"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px">${ui('corrections')}</div>${cResult.corrections.map(c=>`<div style="border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><span class="ar" style="background:#3b1a1a;color:#ef4444;border-radius:8px;padding:3px 10px;font-size:16px">${c.original}</span><span style="color:var(--text3)">→</span><span class="ar" style="background:#1a3b1a;color:#4ade80;border-radius:8px;padding:3px 10px;font-size:16px">${c.fixed}</span></div><div style="font-size:12px;color:var(--text2)">${c.explanation}</div></div>`).join('')}</div>`:''}`:''}

async function correctText(){
  const input=document.getElementById('corrIn').value.trim(); if(!input)return;
  const btn=document.getElementById('corrBtn'); btn.textContent=ui('aiCorrecting'); btn.disabled=true;
  try{
    const raw=await callAI(`Correct this Arabic text: "${input}". ONLY JSON: {"corrected":"corrected with full diacritics","corrections":[{"original":"wrong","fixed":"correct","explanation":"explanation in ${LANGS[lang].name}"}],"level":"A1/A2/B1/B2/C1/C2"}`);
    const p=pJ(raw);
    if(p){cResult=p;renderKorrektor(document.getElementById('app'));}
    else{alert('KI Fehler');btn.textContent=ui('correctBtn');btn.disabled=false;}
  }catch(e){alert('Fehler: '+e.message);btn.textContent=ui('correctBtn');btn.disabled=false;}
}

function getChatLevel(){
  const n=getVocabUpToHere().length;
  if(n<=5) return {level:1,desc:'Anfänger',info:'Der Bot benutzt nur allereinfachste Wörter und kurze Sätze.'};
  if(n<=15) return {level:2,desc:'Grundstufe',info:'Der Bot benutzt einfache Sätze mit deinen Vokabeln.'};
  if(n<=30) return {level:3,desc:'Mittelstufe',info:'Der Bot variiert mehr und stellt Fragen.'};
  return {level:4,desc:'Fortgeschritten',info:'Der Bot führt natürlichere Gespräche.'};
}

function getBotPrompt(){
  const vocab=getVocabUpToHere().map(v=>v.arabic+'='+getTr(v)).join(', ');
  const n=getVocabUpToHere().length;
  const noHarakatNote = `\nWICHTIG: Der Lernende schreibt oft OHNE Harakat (Vokalisierung/Tashkil), z.B. "مرحبا" statt "مَرْحَبًا". Das ist VÖLLIG NORMAL und KEIN Fehler. Verstehe seine Nachricht trotzdem korrekt. Korrigiere NIEMALS das Fehlen von Harakat als Fehler.`;
  const wordExplainNote = `\nNEUE WÖRTER ERKLÄREN: Der Lernende kennt bisher diese Wörter: ${vocab||'noch keine'}. Du darfst gerne auch andere natürliche, alltägliche Wörter benutzen (das macht das Gespräch lebendig!). Aber: für JEDES Wort in deiner Antwort, das NICHT in der obigen Liste steht (außer Pronomen, Partikeln wie وَ/فِي/مِنْ/إِلَى, und absoluten Grundwörtern wie مَرْحَبًا/نَعَمْ/لَا/كَيْفَ), gib am Ende ein JSON-Array mit Erklärungen mit. Format ganz am Ende der Antwort (nach der Korrektur-Klammer falls vorhanden):
[[NEUWORT:عربي:bedeutung auf Deutsch]]
Ein Tag pro neuem Wort, jedes auf eigener Zeile. Wenn keine neuen Wörter benutzt wurden, lass das komplett weg.`;
  const corrFormat = `\nKorrektur-Format: Wenn der Lernende einen ECHTEN Fehler macht (falsches Wort, falsche Grammatik, NICHT fehlende Harakat), schreibe deine arabische Antwort normal, und füge danach in runden Klammern auf Deutsch eine SEHR KURZE Korrektur hinzu, z.B. "(Tipp: es heißt أَنَا أَيْضًا nicht أَنَا إِيضًا)". Maximal 10 Wörter in der Klammer. Wenn kein Fehler vorliegt, KEINE Klammer hinzufügen.`;
  if(n<=5) return `Du bist ein freundlicher Arabisch-Gesprächspartner für absolute Anfänger.
Regeln:
- Antworte IMMER auf Arabisch mit vollständigen Vokalisierungszeichen (Tashkil auf JEDEM Wort).
- Maximal 1 kurzer, natürlicher Satz.${corrFormat}${wordExplainNote}${noHarakatNote}`;
  if(n<=15) return `Du bist ein freundlicher Arabisch-Gesprächspartner für Anfänger.
Regeln:
- Antworte IMMER auf Arabisch mit vollständigen Vokalisierungszeichen.
- Maximal 1-2 kurze, natürliche Sätze.${corrFormat}${wordExplainNote}${noHarakatNote}`;
  if(n<=30) return `Du bist ein Arabisch-Gesprächspartner für Lernende mit Grundkenntnissen.
Regeln:
- Antworte IMMER auf Arabisch mit vollständigen Vokalisierungszeichen.
- 2 natürliche Sätze, stelle auch mal eine Frage.${corrFormat}${wordExplainNote}${noHarakatNote}`;
  return `Du bist ein Arabisch-Gesprächspartner für fortgeschrittene Lernende.
Regeln:
- Antworte IMMER auf Arabisch mit vollständigen Vokalisierungszeichen.
- Natürliche Konversation, 2-3 Sätze.${corrFormat}${wordExplainNote}${noHarakatNote}`;
}

async function startChat(){
  vChatStarted=true; vMsgs=[]; vLoad=true;
  renderSprechen(document.getElementById('app'));
  try{
    const raw=await callAI(getBotPrompt()+'\n\nBegrüße den Lernenden kurz auf Arabisch und stell eine einfache Frage.',200);
    let text2=raw.trim();
    const newWords=[];
    text2=text2.replace(/\[\[NEUWORT:([^:]+):([^\]]+)\]\]/g,(m,ar,de)=>{newWords.push({ar:ar.trim(),de:de.trim()});return '';}).trim();
    vMsgs=[{role:'ai',text:text2,newWords}];
    speakAr(text2);
  }catch{vMsgs=[{role:'ai',text:'مَرْحَبًا! كَيْفَ حَالُكَ؟'}];}
  vLoad=false;
  renderSprechen(document.getElementById('app'));
}

window._sendV = function(text){ sendVoice(text); };

async function sendVoice(text){
  if(!text.trim()||vLoad)return;
  const inp=document.getElementById('vIn'); if(inp)inp.value='';
  vMsgs.push({role:'user',text:text.trim()});
  vLoad=true; renderSprechen(document.getElementById('app'));
  try{
    const history=vMsgs.map(m=>`${m.role==='user'?'Lernender':'Bot'}: ${m.text}`).join('\n');
    const replyRaw=await callAI(getBotPrompt()+`\n\nGesprächsverlauf:\n${history}\n\nAntworte jetzt.`,300);
    let text2=replyRaw.trim();
    // Extract new word explanation tags [[NEUWORT:arabic:meaning]]
    const newWords=[];
    text2=text2.replace(/\[\[NEUWORT:([^:]+):([^\]]+)\]\]/g,(m,ar,de)=>{newWords.push({ar:ar.trim(),de:de.trim()});return '';}).trim();
    // Extract correction in () if present
    const corrMatch=text2.match(/\(([^)]+)\)\s*$/);
    const correction=corrMatch?corrMatch[1]:null;
    const arabicOnly=correction?text2.replace(/\s*\([^)]+\)\s*$/,'').trim():text2;
    vMsgs.push({role:'ai',text:arabicOnly,correction,newWords});
    speakAr(arabicOnly);
  }catch{vMsgs.push({role:'ai',text:'أَعِدِ الْمُحَاوَلَةَ.'});}
  vLoad=false; renderSprechen(document.getElementById('app'));
}

function speakAr(text){
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ar-SA'; u.rate=0.85; u.pitch=1;
    const vs=speechSynthesis.getVoices();
    const av=vs.find(v=>v.lang.startsWith('ar'));
    if(av)u.voice=av;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch{}
}
