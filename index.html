<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>

<meta name="theme-color" content="#080c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
:root{--bg:#080c14;--bg2:#0d1526;--bg3:#1a2540;--border:#1e2d4a;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--gold:#F59E0B;--gold2:#d97706}
[data-theme="light"]{--bg:#e8edf5;--bg2:#ffffff;--bg3:#d0d8e8;--border:#9aaac0;--text:#0a1628;--text2:#1a3355;--text3:#2d4a6e;--gold:#c47a00;--gold2:#9a5f00}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;transition:background 0.3s,color 0.3s}
.ar{font-family:'Noto Naskh Arabic',serif;direction:rtl;text-align:right}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px}
.gold-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:14px;color:#080c14;font-weight:800;font-size:15px;padding:14px 0;width:100%;cursor:pointer;font-family:'Inter',sans-serif}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-size:14px;width:100%;box-sizing:border-box;font-family:'Inter',sans-serif;outline:none}
#app{padding-bottom:90px;min-height:100vh}
#topbar{height:3px;background:linear-gradient(90deg,#F59E0B,#d97706,#92400e,#F59E0B);position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:99}
#navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:50;backdrop-filter:blur(10px)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding:24px;max-height:90vh;overflow-y:auto}
.quick-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:transform 0.1s,border-color 0.2s;-webkit-tap-highlight-color:transparent}
.quick-card:active{transform:scale(0.97)}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="app" style="padding-top:3px"></div>
<div id="navbar"></div>

  {ar:'اللِّسَانُ مِيزَانُ الْإِنْسَانِ',de:'Die Zunge ist das Maß des Menschen.',hint:'Sprache offenbart den Charakter.'},
];

function saveProjects(){ try{localStorage.setItem('projects_v2',JSON.stringify(projects))}catch{} }
function getP(){ return projects[curProject]||projects[0]; }

function getVerbs(){ return getP().verbs||[]; }
function setVocab(v){ projects[curProject].vocab=v; saveProjects(); }
function setVerbs(v){ projects[curProject].verbs=v; saveProjects(); }
function getTr(item){ return item.translations?(item.translations[lang]||item.translations.de||''):(item.translation||item.german||''); }
function getExTr(item){ return item.exampleTranslation?(item.exampleTranslation[lang]||item.exampleTranslation.de||''):''; }

// ═══════════════════════════════════════════════════════
// STREAK & STATS
// ═══════════════════════════════════════════════════════
let streak = JSON.parse(localStorage.getItem('streak_v4')||'{"days":0,"lastDate":"","longest":0,"todayXP":0,"totalXP":0}');
let stats = JSON.parse(localStorage.getItem('stats_v1')||'{"learned":0,"reviewed":0,"sessions":0}');

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(streak.lastDate===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yk=y.toISOString().slice(0,10);
  streak.days = streak.lastDate===yk ? streak.days+1 : 1;
  streak.lastDate=today; streak.longest=Math.max(streak.longest,streak.days); streak.todayXP=0;
  try{localStorage.setItem('streak_v4',JSON.stringify(streak))}catch{}
}
function addXP(n){ streak.todayXP=(streak.todayXP||0)+n; streak.totalXP=(streak.totalXP||0)+n; try{localStorage.setItem('streak_v4',JSON.stringify(streak))}catch{} }
updateStreak();

// ═══════════════════════════════════════════════════════
// SRS
// ═══════════════════════════════════════════════════════
function isDue(c){ return !c.nextReview||Date.now()>=c.nextReview; }
function calcNext(card,score){
  let {interval=1,easeFactor=2.5,repetitions=0,failCount=0}=card, fc=failCount;
  if(score<3){repetitions=0;fc=Math.min(failCount+1,5);interval=1;}
  else{fc=Math.max(0,failCount-1);interval=repetitions===0?1:repetitions===1?6:Math.round(interval*easeFactor);repetitions++;}
  easeFactor=Math.max(1.3,easeFactor+0.1-(5-score)*(0.08+(5-score)*0.02));
  const pf=fc>0?Math.max(0.3,1-fc*0.15):1;
  const ai=score<3?interval:Math.max(1,Math.round(interval*pf));
  return{...card,interval:ai,easeFactor,repetitions,nextReview:Date.now()+ai*86400000,status:score>=4?'gelernt':score>=2?'lernend':'neu',lastScore:score,failCount:fc};
}
function buildPool(vocab,f){
  const base=vocab.filter(v=>f==='fällig'?isDue(v):f==='alle'?true:v.status===f);
  const pool=[];
  for(const c of base){const fc=c.failCount||0,t=fc>=4?4:fc>=3?3:fc>=2?2:1;for(let i=0;i<t;i++)pool.push(c);}
  return pool.sort(()=>Math.random()-0.5);
}

// ═══════════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════════
async function callAI(prompt,maxTokens=1500){
  const r=await fetch('/.netlify/functions/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,maxTokens})});
  const d=await r.json(); return d.text||'';
}
function pJ(text){
  try{const c=text.replace(/```json|```/g,'').trim();const a=c.indexOf('[')!==-1&&c.indexOf('[')< (c.indexOf('{')===-1?9999:c.indexOf('{'));const s=a?'[':'{',e=a?']':'}';return JSON.parse(c.slice(c.indexOf(s),c.lastIndexOf(e)+1));}catch{return null;}
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  const nav=document.getElementById('navbar');
  const due=getVocab().filter(isDue).length;

  const TABS=[
    {id:'home',icon:'🏠',label:'Home'},
    {id:'lernen',icon:'📚',label:'Lernen'},
    {id:'sprechen',icon:'🎤',label:'Sprechen'},
    {id:'profil',icon:'👤',label:'Profil'},
  ];
  nav.innerHTML=TABS.map(t=>`<button onclick="goTab('${t.id}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;position:relative">
    <span style="font-size:20px">${t.icon}</span>
    <span style="font-size:9px;font-weight:700;color:${tab===t.id?'var(--gold)':'var(--text3)'}">${t.label.toUpperCase()}</span>
    ${tab===t.id?'<div style="width:20px;height:2px;background:var(--gold);border-radius:2px"></div>':''}
    ${t.id==='lernen'&&due>0?`<div style="position:absolute;top:0;right:22%;background:#ef4444;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center">${due}</div>`:''}
  </button>`).join('');

  if(tab==='home') renderHome(app);
  else if(tab==='lernen') renderLernen(app);
  else if(tab==='sprechen') renderSprechen(app);
  else renderProfil(app);
}

function goTab(t){ tab=t; subView=null; render(); }

    ${vocab.slice(0,3).map(v=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:14px">
      <div><div style="font-size:13px;color:var(--text2)">${getTr(v)}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${v.wordType||''} · ${v.status||'neu'}</div></div>
      <div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div>
    </div>`).join('')}`:''}
  </div>`;
}

// LERNEN (enthält Vokabeln, Karten, Verben, Spiele, Korrektur)
// ═══════════════════════════════════════════════════════

  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="padding-top:6px;margin-bottom:24px">
      <div style="font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase">Lernen</div>

    <!-- Hauptlernbereich -->

      <div style="font-size:28px;margin-bottom:8px">🔄</div>
      <div style="font-size:18px;font-weight:800;color:${due>0?'#4ade80':'var(--text)'}">Wiederholungen</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px">${due>0?`${due} Karten warten auf dich!`:'Alle Karten gelernt – komm morgen wieder.'}</div>
      ${due>0?`<div style="margin-top:12px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:10px;padding:10px;text-align:center;color:#0a1628;font-weight:800;font-size:14px">Jetzt ${due} Karten lernen →</div>`:''}
    </div>

    <div onclick="subView='karten';render()" style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;display:flex;gap:14px;align-items:center">
      <div style="font-size:32px">✨</div>
      <div><div style="font-size:16px;font-weight:700;color:var(--text)">Neue Wörter</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${neu} neue Wörter noch nicht gelernt</div></div>
      <div style="color:var(--text3);font-size:20px;margin-left:auto">›</div>

        {icon:'📖',title:'Vokabeln',desc:'Wörter verwalten',sv:'vokabeln'},
        {icon:'📚',title:'Verben',desc:'Konjugationstabellen',sv:'verben'},
        {icon:'🎮',title:'Spiele',desc:'Spielerisch üben',sv:'spiele'},
        {icon:'✍️',title:'Korrektur',desc:'Texte prüfen',sv:'korrektor'},
      ].map(q=>`<div class="quick-card" onclick="subView='${q.sv}';render()">
        <div style="font-size:24px">${q.icon}</div>
        <div style="font-size:14px;font-weight:700;color:var(--text)">${q.title}</div>
        <div style="font-size:11px;color:var(--text3)">${q.desc}</div>

}

// ── VOKABELN ─────────────────────────────────────────────────────────────────
function renderVokabeln(app){
  const vocab=getVocab();
  const due=vocab.filter(isDue).length;
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:6px">
      <button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button>
      <div><div style="font-size:11px;color:var(--text3)">LERNEN</div><div style="font-size:20px;font-weight:800;color:var(--text)">Vokabeln</div></div>
      <button onclick="showAddVocab()" class="gold-btn" style="width:auto;padding:8px 16px;margin-left:auto;font-size:13px">+ Hinzufügen</button>
    </div>
    ${due>0?`<div onclick="subView='karten';render()" style="background:linear-gradient(135deg,#1a2f1a,#0d1a0d);border:1px solid #22c55e;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer"><div><div style="font-size:13px;font-weight:700;color:#4ade80">🔔 ${due} Wiederholungen fällig</div><div style="font-size:11px;color:var(--text3)">Tippe um zu lernen</div></div><div style="font-size:24px;font-weight:800;color:#4ade80">${due}</div></div>`:''}
    <input placeholder="🔍 Suchen..." oninput="filterVocab(this.value)" style="margin-bottom:14px"/>
    <div id="vocabList">${vocab.map(v=>vocabCard(v)).join('')}</div>
  </div>`;
}

function vocabCard(v){
  const tr=getTr(v), exTr=getExTr(v);
  const sc=v.status==='gelernt'?'#4ade80':v.status==='lernend'?'#60a5fa':'var(--text3)';
  const sb=v.status==='gelernt'?'#14532d':v.status==='lernend'?'#1e3a5f':'var(--bg3)';
  const isAdj=(v.wordType||'').toLowerCase().includes('adj');
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3)">${v.wordType||''}</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-top:2px">${tr}</div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">مفرد</div><div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div></div>
          ${v.plural&&v.plural!=='-'?`<div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">جمع</div><div class="ar" style="font-size:24px;color:#a78bfa;font-weight:700">${v.pluralHarakat||v.plural}</div></div>`:''}
          ${isAdj&&v.opposite&&v.opposite!==''?`<div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">ضد</div><div class="ar" style="font-size:24px;color:#60a5fa;font-weight:700">${v.oppHarakat||v.opposite}</div></div>`:''}
        </div>
        ${v.exampleArabic?`<div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:10px"><div class="ar" style="font-size:16px;color:var(--text);line-height:1.9">${v.exampleArabic}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${exTr}</div></div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <span style="background:${sb};color:${sc};border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700">${v.status||'neu'}</span>
        <button onclick="deleteVocab(${v.id})" style="background:#3b1a1a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer">Löschen</button>
      </div>
    </div>
  </div>`;
}

function filterVocab(q){
  const vocab=getVocab();
  const filtered=vocab.filter(v=>v.arabic.includes(q)||getTr(v).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('vocabList').innerHTML=filtered.map(v=>vocabCard(v)).join('');
}
function deleteVocab(id){ setVocab(getVocab().filter(v=>v.id!==id)); renderVokabeln(document.getElementById('app')); }

function showAddVocab(){
  const m=document.createElement('div'); m.className='overlay';
  m.innerHTML=`<div class="sheet"><div style="display:flex;justify-content:space-between;margin-bottom:18px"><div style="font-size:18px;font-weight:800;color:var(--text)">Vokabel hinzufügen</div><button onclick="this.closest('.overlay').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px">✕</button></div>
    <input id="arIn" placeholder="Arabisches Wort..." class="ar" style="font-size:22px;margin-bottom:10px;color:var(--gold)"/>
    <input id="trIn" placeholder="Übersetzung (optional)" style="margin-bottom:14px"/>
    <button class="gold-btn" onclick="addVocab()" id="addVBtn">Karte erstellen</button>
  </div>`;
  document.body.appendChild(m);
}

async function addVocab(){
  const ar=document.getElementById('arIn').value.trim();
  const tr=document.getElementById('trIn').value.trim();
  if(!ar)return;
  const btn=document.getElementById('addVBtn');
  btn.textContent='KI ergänzt...'; btn.disabled=true;
  try{
    const raw=await callAI(`For Arabic word "${ar}" (hint: "${tr||'translate'}"): Reply ONLY with JSON:
{"arabic":"${ar}","harakat":"word with FULL diacritics including tanwin e.g. كِتَابٌ","translations":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"},"wordType":"Nomen/Verb/Adjektiv/etc","opposite":"Arabic opposite WITH diacritics only if Adjektiv else empty string","oppHarakat":"opposite with diacritics or empty","plural":"Arabic plural WITH diacritics or -","pluralHarakat":"plural with diacritics or -","exampleArabic":"example sentence with FULL diacritics","exampleTranslation":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"}}`);
    const p=pJ(raw);
    if(p){ setVocab([{...p,id:Date.now(),status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},...getVocab()]); document.querySelector('.overlay').remove(); addXP(5); renderVokabeln(document.getElementById('app')); }
    else{alert('KI Fehler');btn.textContent='Karte erstellen';btn.disabled=false;}
  }catch(e){alert('Fehler: '+e.message);btn.textContent='Karte erstellen';btn.disabled=false;}
}

// ── KARTEN (Spaced Repetition) ────────────────────────────────────────────────
let lP=[],lI=0,lF=false,lS={p:0,g:0,s:0},lD=false,lFilter='fällig';
const RATES=[{l:'Gar nicht',c:'#ef4444',s:0},{l:'Schlecht',c:'#f97316',s:1},{l:'Okay',c:'#eab308',s:2},{l:'Gut',c:'#84cc16',s:3},{l:'Super',c:'#22c55e',s:4},{l:'Perfekt',c:'#a3e635',s:5}];

function renderKarten(app){
  lP=buildPool(getVocab(),lFilter); lI=0; lF=false; lS={p:0,g:0,s:0}; lD=false;
  showCard(app);
}
function showCard(app){
  const fb=['fällig','alle','neu','lernend','gelernt'].map(f=>`<button onclick="lFilter='${f}';renderKarten(document.getElementById('app'))" style="background:${lFilter===f?'var(--gold)':'var(--bg3)'};border:1px solid ${lFilter===f?'var(--gold)':'var(--border)'};color:${lFilter===f?'#080c14':'var(--text2)'};border-radius:10px;padding:6px 10px;font-weight:700;font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('');
  if(lD){
    app.innerHTML=`<div style="padding:20px 16px 100px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Session abgeschlossen! 🏆</div></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">${[['Perfekt','p','#a3e635'],['Gut','g','#F59E0B'],['Schlecht','s','#ef4444']].map(([l,k,c])=>`<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:900;color:${c}">${lS[k]}</div><div style="font-size:11px;color:var(--text3)">${l}</div></div>`).join('')}</div>
    ${lS.s>0?`<div style="background:#1a1000;border:1px solid #92400e;border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--gold)">Schlechte Karten kommen öfter wieder.</div>`:''}
    <button class="gold-btn" onclick="renderKarten(document.getElementById('app'))">Nochmal lernen</button></div>`; return;
  }
  if(!lP.length){
    app.innerHTML=`<div style="padding:20px 16px 100px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Lernkarten</div></div>
    <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${fb}</div>
    <div style="text-align:center;color:var(--text3);padding:60px 0;font-size:15px">Keine Karten.</div></div>`; return;
  }
  const card=lP[lI];
  const tr=getTr(card), exTr=getExTr(card);
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:6px">
      <button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button>
      <div style="font-size:20px;font-weight:800;color:var(--text)">Lernkarten</div>
      <div style="font-size:13px;font-weight:700;color:var(--gold);margin-left:auto">${lI+1}/${lP.length}</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">${fb}</div>
    <div style="background:var(--bg3);border-radius:4px;height:4px;margin-bottom:16px"><div style="width:${((lI+1)/lP.length)*100}%;background:${(card.failCount||0)>1?'#ef4444':'var(--gold)'};height:4px;border-radius:4px;transition:width 0.4s"></div></div>
    <div onclick="lF=!lF;showCard(document.getElementById('app'))" style="background:var(--bg2);border:1px solid ${(card.failCount||0)>1?'#7f1d1d':'var(--border)'};border-radius:20px;padding:24px;min-height:260px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;margin-bottom:14px">
      ${!lF?`${(card.failCount||0)>0?`<div style="font-size:10px;color:#f97316;margin-bottom:10px;font-weight:700">SCHWIERIG – ${card.failCount}x falsch</div>`:''}
      <div style="font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:18px">Tippen zum Umdrehen</div>
      <div class="ar" style="font-size:58px;color:var(--gold);font-weight:700;line-height:1.4;margin-bottom:10px">${card.harakat||card.arabic}</div>
      <div style="font-size:12px;color:var(--text3)">${card.wordType||''}</div>`
      :`<div style="width:100%">
        <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:18px">${tr}</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
          ${card.plural&&card.plural!=='-'?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">جمع</div><div class="ar" style="font-size:20px;color:#a78bfa">${card.pluralHarakat||card.plural}</div></div>`:''}
          ${(card.wordType||'').toLowerCase().includes('adj')&&card.opposite&&card.opposite!==''?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">ضد</div><div class="ar" style="font-size:20px;color:#60a5fa">${card.oppHarakat||card.opposite}</div></div>`:''}
        </div>
        ${card.exampleArabic?`<div style="background:var(--bg3);border-radius:12px;padding:14px"><div class="ar" style="font-size:18px;color:var(--text);line-height:2;margin-bottom:6px">${card.exampleArabic}</div><div style="font-size:12px;color:var(--text3)">${exTr}</div></div>`:''}</div>`}
    </div>
    ${lF?`<div><div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px">Wie gut kanntest du das Wort?</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">${RATES.map(r=>`<button onclick="rateCard(${r.s})" style="background:var(--bg2);border:1px solid ${r.c}44;border-radius:14px;padding:14px 6px;cursor:pointer;text-align:center"><div style="font-size:14px;font-weight:800;color:${r.c}">${r.l}</div>${r.s<2?'<div style="font-size:9px;color:var(--text3);margin-top:2px">öfter</div>':r.s>=4?'<div style="font-size:9px;color:var(--text3);margin-top:2px">seltener</div>':''}</button>`).join('')}</div>
    <button onclick="lF=false;lI++;if(lI>=lP.length){lD=true;}showCard(document.getElementById('app'))" style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;width:100%;color:var(--text2);font-weight:700;cursor:pointer">Überspringen</button></div>`:''}`
}
function rateCard(score){
  const card=lP[lI];
  const updated=calcNext(card,score);
  setVocab(getVocab().map(v=>v.id===card.id?updated:v));
  if(score>=4)lS.p++;else if(score>=2)lS.g++;else lS.s++;
  addXP(score>=4?10:score>=2?5:2);
  lI++; lF=false;
  if(lI>=lP.length){lD=true;updateStreak();}
  showCard(document.getElementById('app'));
}

// ── VERBEN ────────────────────────────────────────────────────────────────────
let activeTense='vergangenheit';
const TENSES=[
  {key:'vergangenheit',ar:'الْمَاضِي',label:'Vergangenheit',color:'#60a5fa'},
  {key:'gegenwart',ar:'الْمُضَارِع',label:'Gegenwart',color:'#a3e635'},
  {key:'zukunft',ar:'الْمُسْتَقْبَل',label:'Zukunft',color:'#F59E0B'},
  {key:'befehl',ar:'الْأَمْر',label:'Befehl',color:'#f472b6'},
];

function renderVerben(app){
  const verbs=getVerbs();
  const tc=TENSES.find(x=>x.key===activeTense);
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:6px">
      <button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button>
      <div><div style="font-size:11px;color:var(--text3)">LERNEN</div><div style="font-size:20px;font-weight:800;color:var(--text)">Verben</div></div>
      <button onclick="showAddVerb()" class="gold-btn" style="width:auto;padding:8px 14px;margin-left:auto;font-size:13px">+ Verb</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      ${TENSES.map(tn=>`<button onclick="activeTense='${tn.key}';renderVerben(document.getElementById('app'))" style="background:${activeTense===tn.key?tn.color+'22':'var(--bg2)'};border:2px solid ${activeTense===tn.key?tn.color:'var(--border)'};border-radius:16px;padding:14px;cursor:pointer;text-align:center">
        <div class="ar" style="font-size:16px;color:${tn.color};font-weight:700;margin-bottom:4px">${tn.ar}</div>
        <div style="font-size:11px;color:var(--text3);font-weight:600">${tn.label}</div>
      </button>`).join('')}
    </div>
    ${verbs.length===0?`<div style="text-align:center;color:var(--text3);padding:40px 0">Noch keine Verben. Tippe auf + Verb.</div>`:''}
    ${verbs.map(v=>`<div style="display:flex;margin-bottom:10px">
      <button onclick="showVerbDetail(${v.id})" style="flex:1;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:18px 0 0 18px;padding:14px 16px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:13px;color:var(--text2)">${getTr(v)}</div>${v.konjugation?.[activeTense]?.[0]?`<div class="ar" style="font-size:13px;color:${tc.color};margin-top:4px">${v.konjugation[activeTense][0].a}</div>`:''}</div>
        <div style="display:flex;align-items:center;gap:8px"><div class="ar" style="font-size:28px;color:var(--gold);font-weight:700">${v.arabic}</div><div style="color:${tc.color};font-size:18px">›</div></div>
      </button>
      <button onclick="setVerbs(getVerbs().filter(x=>x.id!==${v.id}));renderVerben(document.getElementById('app'))" style="background:#3b1a1a;border:1px solid #7f1d1d;border-radius:0 18px 18px 0;padding:0 14px;cursor:pointer;color:#fca5a5;font-size:14px">✕</button>
    </div>`).join('')}
  </div>`;
}

function showVerbDetail(id){
  const verb=getVerbs().find(v=>v.id===id); if(!verb)return;
  let vt=activeTense;

async function startGame(mode){
  gMode=mode;gI=0;gScore=0;gDone=false;gResult=null;gAns='';
  const vocab=getVocab();
  if(vocab.length<4){alert('Mindestens 4 Vokabeln nötig!');gMode=null;renderSpiele(document.getElementById('app'));return;}
  renderSpiele(document.getElementById('app'));
  const sh=arr=>[...arr].sort(()=>Math.random()-0.5);
  if(mode==='mc'||mode==='ar2tr'||mode==='tr2ar'){gQ=sh(vocab).slice(0,10);if(mode==='mc')buildMC(0);}
  else if(mode==='saetze'){
    try{
      const wl=sh(vocab).slice(0,6).map(v=>`${v.arabic} (${getTr(v)})`).join(', ');
      const raw=await callAI(`Create 6 simple translation exercises (max 5 words) using: ${wl}. Alternate Arabic→${LANGS[lang].name} and ${LANGS[lang].name}→Arabic. ONLY JSON: [{"aufgabe":"sentence","dir":"ar2tr or tr2ar","loesung":"translation","hinweis":"hint in ${LANGS[lang].name}"}]`,1200);
      const p=pJ(raw);
      if(Array.isArray(p)&&p.length>0){gQ=p;renderSpiele(document.getElementById('app'));}
      else{alert('KI Fehler');gMode=null;renderSpiele(document.getElementById('app'));}
    }catch{alert('KI Fehler');gMode=null;renderSpiele(document.getElementById('app'));}
  }
  renderSpiele(document.getElementById('app'));
}
function buildMC(idx){const vocab=getVocab();const c=gQ[idx];const w=[...vocab].sort(()=>Math.random()-0.5).filter(v=>v.id!==c.id).slice(0,3);gMC=[...[c,...w]].sort(()=>Math.random()-0.5);}
function checkGame(given){
  const q=gQ[gI];const qTr=getTr(q)||'';let ok=false;
  if(gMode==='mc')ok=given===q.id;
  else if(gMode==='ar2tr')ok=String(given).toLowerCase().trim().includes(qTr.toLowerCase().split(',')[0].trim().slice(0,4));
  else if(gMode==='tr2ar')ok=String(given).trim()===q.arabic||String(given).trim()===(q.harakat||q.arabic);
  else if(gMode==='saetze'){const l=q.loesung.toLowerCase();ok=String(given).toLowerCase().trim().length>2&&(l.includes(String(given).toLowerCase().trim().slice(0,4))||String(given).toLowerCase().includes(l.slice(0,4)));}
  gResult=ok?'correct':'wrong';if(ok){gScore++;addXP(10);}
  renderSpiele(document.getElementById('app'));
}
function nextGame(){gI++;gResult=null;gAns='';if(gI>=gQ.length){gDone=true;}else if(gMode==='mc')buildMC(gI);renderSpiele(document.getElementById('app'));}

    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Szenarien wählen</div>

      <div style="display:flex;gap:12px;align-items:center">
        <div style="font-size:28px">${s.icon}</div>
        <div><div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px">${s.de}</div><div style="font-size:11px;color:var(--text3)">${s.desc}</div></div>
      </div>

    </div>`).join('')}

}

function renderVoiceChat(app){
  const speechOk='SpeechRecognition' in window||'webkitSpeechRecognition' in window;
  app.innerHTML=`<div style="display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;padding-top:3px">
    <div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div>
        <div style="font-size:11px;color:var(--text3)">SPRACH-CHAT</div>
        <div style="font-size:16px;font-weight:800;color:var(--text)">${SCENES.find(s=>s.id===vScene)?.de||''}</div>
      </div>
      <button onclick="vScene=null;vMsgs=[];render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer">← Zurück</button>
    </div>
    <div id="vchat" style="flex:1;overflow-y:auto;padding:16px;background:var(--bg)">
      ${vMsgs.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'};margin-bottom:12px">
        <div style="max-width:82%;background:${m.role==='user'?'#1e3a5f':'var(--bg2)'};border:1px solid ${m.role==='user'?'#3b5f8a':'var(--border)'};border-radius:${m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px'};padding:12px 14px">
          <div class="ar" style="font-size:19px;color:${m.role==='user'?'#f8fafc':'var(--text)'};line-height:1.9">${m.text}</div>
          ${m.fb?`<div style="margin-top:8px;padding:8px;background:${m.fb.correct?'#14532d':'#7f1d1d'};border-radius:8px">
            <div style="font-size:12px;color:${m.fb.correct?'#4ade80':'#fca5a5'};font-weight:700">${m.fb.correct?'✓ Richtig!':'✗ Korrektur'}</div>
            ${!m.fb.correct&&m.fb.corrected?`<div class="ar" style="font-size:14px;color:#f8fafc;margin-top:4px">${m.fb.corrected}</div>`:''}
            ${m.fb.tip?`<div style="font-size:11px;color:#94a3b8;margin-top:4px">${m.fb.tip}</div>`:''}
          </div>`:''}
        </div>
      </div>`).join('')}
      ${vLoad?`<div style="display:flex;justify-content:flex-start;margin-bottom:10px"><div style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:14px 18px"><div style="display:flex;gap:5px">${[0,1,2].map(i=>`<div style="width:8px;height:8px;background:var(--gold);border-radius:50%;opacity:0.7"></div>`).join('')}</div></div></div>`:''}
    </div>
    <div style="background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px 28px;flex-shrink:0">
      <div style="display:flex;gap:8px;align-items:center">
        <input id="vIn" placeholder="اكتب أو استخدم الميكروفون..." class="ar" style="flex:1;font-size:17px;color:var(--gold)" onkeydown="if(event.key==='Enter'&&this.value.trim())sendVoice(this.value)"/>
        ${speechOk?`<button onclick="vRec?stopRec():startRec()" id="micBtn" style="background:${vRec?'#ef4444':'#1e3a5f'};border:1px solid ${vRec?'#ef4444':'#3b5f8a'};border-radius:12px;padding:0 16px;height:48px;cursor:pointer;color:white;font-size:20px;flex-shrink:0">${vRec?'■':'🎤'}</button>`:''}
        <button onclick="const v=document.getElementById('vIn').value;if(v.trim())sendVoice(v)" style="background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;padding:0 16px;height:48px;cursor:pointer;color:#080c14;font-weight:800;flex-shrink:0">→</button>
      </div>
      ${vRec?`<div style="font-size:11px;color:#ef4444;text-align:center;margin-top:6px;font-weight:600">● Aufnahme läuft...</div>`:''}
    </div>
  </div>`;
  setTimeout(()=>{const c=document.getElementById('vchat');if(c)c.scrollTop=c.scrollHeight;},100);
}

async function startVoice(sceneId){
  vScene=sceneId; vMsgs=[]; vLoad=true;
  renderSprechen(document.getElementById('app'));
  const s=SCENES.find(x=>x.id===sceneId);
  const prompt=sceneId==='frei'
    ?`أنت شريك محادثة عربي. أجب باللغة العربية مع الشكل الكامل فقط. جمل بسيطة. ابدأ بتحية.`
    :`أنت في سيناريو: "${s.de}". أجب باللغة العربية مع الشكل الكامل. ابدأ في دورك بجملتين بسيطتين.`;
  try{
    const raw=await callAI(prompt,200);
    vMsgs=[{role:'ai',text:raw.trim()}];
    speakAr(raw.trim());
  }catch{vMsgs=[{role:'ai',text:'مرحباً! كيف حالك؟'}];}
  vLoad=false;
  renderSprechen(document.getElementById('app'));
}

function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
  const rec=new SR(); rec.lang='ar-SA'; rec.continuous=false; rec.interimResults=false;
  rec.onresult=e=>{const t=e.results[0][0].transcript;vRec=false;sendVoice(t);};
  rec.onerror=()=>{vRec=false;renderSprechen(document.getElementById('app'));};
  rec.onend=()=>{vRec=false;};
  vRecObj=rec; rec.start(); vRec=true;
  renderSprechen(document.getElementById('app'));
}
function stopRec(){if(vRecObj)vRecObj.stop();vRec=false;renderSprechen(document.getElementById('app'));}

async function sendVoice(text){
  if(!text.trim()||vLoad)return;
  const inp=document.getElementById('vIn'); if(inp)inp.value='';
  vMsgs.push({role:'user',text:text.trim()});
  vLoad=true; renderSprechen(document.getElementById('app'));
  try{
    const [fbRaw,replyRaw]=await Promise.all([
      callAI(`Analyze Arabic learner sentence: "${text.trim()}". ONLY JSON: {"correct":true,"corrected":"with full diacritics or same","tip":"tip in German or empty"}`,300),
      callAI(`Conversation (${vScene}):\n${vMsgs.map(m=>`${m.role==='user'?'Lernender':'KI'}: ${m.text}`).join('\n')}\nReply in Arabic with full diacritics. Max 2 short sentences.`,200)
    ]);
    const fb=pJ(fbRaw);
    if(fb)vMsgs[vMsgs.length-1].fb=fb;
    const reply=replyRaw.trim();
    vMsgs.push({role:'ai',text:reply});
    speakAr(reply);
  }catch{vMsgs.push({role:'ai',text:'أعد المحاولة.'});}
  vLoad=false; renderSprechen(document.getElementById('app'));
}

function speakAr(text){
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ar-SA'; u.rate=0.85; u.pitch=1;
    const vs=speechSynthesis.getVoices();
    const av=vs.find(v=>v.lang.startsWith('ar'));
    if(av)u.voice=av;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch{}
}

function addNewProject(){
  const name=prompt('Projektname:','Thema '+(projects.length+1));
  if(!name)return; projects.push({id:Date.now(),name,vocab:[],verbs:[]}); saveProjects(); render();
}
function toggleTheme(){
  theme=theme==='dark'?'light':'dark'; localStorage.setItem('theme',theme);
  document.documentElement.setAttribute('data-theme',theme); render();
}
function renderStats(app){
  const vocab=getVocab();

  const lernend=vocab.filter(v=>v.status==='lernend').length;
  const neu=vocab.filter(v=>v.status==='neu').length;
  const total=vocab.length;
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Statistiken</div></div>
