<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
:root{--bg:#080c14;--bg2:#0d1526;--bg3:#1a2540;--border:#1e2d4a;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--gold:#F59E0B;--gold2:#d97706}
[data-theme="light"]{--bg:#e8edf5;--bg2:#ffffff;--bg3:#d0d8e8;--border:#9aaac0;--text:#0a1628;--text2:#1a3355;--text3:#2d4a6e;--gold:#c47a00;--gold2:#9a5f00}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;transition:background 0.3s,color 0.3s}
.ar{font-family:'Noto Naskh Arabic',serif;direction:rtl;text-align:right}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px}
.gold-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:14px;color:#080c14;font-weight:800;font-size:15px;padding:14px 0;width:100%;cursor:pointer;font-family:'Inter',sans-serif}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-size:14px;width:100%;box-sizing:border-box;font-family:'Inter',sans-serif;outline:none}
#app{padding-bottom:90px;min-height:100vh}
#topbar{height:3px;background:linear-gradient(90deg,#F59E0B,#d97706,#92400e,#F59E0B);position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:99}
#navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:50;backdrop-filter:blur(10px)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding:24px;max-height:90vh;overflow-y:auto}
.quick-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:transform 0.1s,border-color 0.2s;-webkit-tap-highlight-color:transparent}
.quick-card:active{transform:scale(0.97)}
</style>
</head>

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(streak.lastDate===today) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yk=y.toISOString().slice(0,10);
  streak.days = streak.lastDate===yk ? streak.days+1 : 1;
  streak.lastDate=today; streak.longest=Math.max(streak.longest,streak.days); streak.todayXP=0;
  try{localStorage.setItem('streak_v4',JSON.stringify(streak))}catch{}
}
function addXP(n){ streak.todayXP=(streak.todayXP||0)+n; streak.totalXP=(streak.totalXP||0)+n; try{localStorage.setItem('streak_v4',JSON.stringify(streak))}catch{} }

function isDue(c){ return !c.nextReview||Date.now()>=c.nextReview; }
function calcNext(card,score){
  let {interval=1,easeFactor=2.5,repetitions=0,failCount=0}=card, fc=failCount;
  if(score<3){repetitions=0;fc=Math.min(failCount+1,5);interval=1;}
  else{fc=Math.max(0,failCount-1);interval=repetitions===0?1:repetitions===1?6:Math.round(interval*easeFactor);repetitions++;}
  easeFactor=Math.max(1.3,easeFactor+0.1-(5-score)*(0.08+(5-score)*0.02));
  const pf=fc>0?Math.max(0.3,1-fc*0.15):1;
  const ai=score<3?interval:Math.max(1,Math.round(interval*pf));
  return{...card,interval:ai,easeFactor,repetitions,nextReview:Date.now()+ai*86400000,status:score>=4?'gelernt':score>=2?'lernend':'neu',lastScore:score,failCount:fc};
}
function buildPool(vocab,f){
  const base=vocab.filter(v=>f==='fällig'?isDue(v):f==='alle'?true:v.status===f);
  const pool=[];
  for(const c of base){const fc=c.failCount||0,t=fc>=4?4:fc>=3?3:fc>=2?2:1;for(let i=0;i<t;i++)pool.push(c);}
  return pool.sort(()=>Math.random()-0.5);
}

    ${vocab.length>0?`<div style="font-size:13px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Zuletzt hinzugefügt</div>
    ${vocab.slice(0,3).map(v=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:14px">
      <div><div style="font-size:13px;color:var(--text2)">${getTr(v)}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${v.wordType||''} · ${v.status||'neu'}</div></div>
      <div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div>
    </div>`).join('')}`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// LERNEN (enthält Vokabeln, Karten, Verben, Spiele, Korrektur)
// ═══════════════════════════════════════════════════════

  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="padding-top:6px;margin-bottom:24px">
      <div style="font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase">Lernen</div>

    <!-- Hauptlernbereich -->

      <div style="font-size:28px;margin-bottom:8px">🔄</div>
      <div style="font-size:18px;font-weight:800;color:${due>0?'#4ade80':'var(--text)'}">Wiederholungen</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px">${due>0?`${due} Karten warten auf dich!`:'Alle Karten gelernt – komm morgen wieder.'}</div>
      ${due>0?`<div style="margin-top:12px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:10px;padding:10px;text-align:center;color:#0a1628;font-weight:800;font-size:14px">Jetzt ${due} Karten lernen →</div>`:''}
    </div>

    <div onclick="subView='karten';render()" style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;display:flex;gap:14px;align-items:center">
      <div style="font-size:32px">✨</div>
      <div><div style="font-size:16px;font-weight:700;color:var(--text)">Neue Wörter</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${neu} neue Wörter noch nicht gelernt</div></div>
      <div style="color:var(--text3);font-size:20px;margin-left:auto">›</div>
    </div>

    <!-- Sub-Navigation -->
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:20px 0 12px">Bereiche</div>

      ${[
        {icon:'📖',title:'Vokabeln',desc:'Wörter verwalten',sv:'vokabeln'},
        {icon:'📚',title:'Verben',desc:'Konjugationstabellen',sv:'verben'},
        {icon:'🎮',title:'Spiele',desc:'Spielerisch üben',sv:'spiele'},
        {icon:'✍️',title:'Korrektur',desc:'Texte prüfen',sv:'korrektor'},
      ].map(q=>`<div class="quick-card" onclick="subView='${q.sv}';render()">
        <div style="font-size:24px">${q.icon}</div>
        <div style="font-size:14px;font-weight:700;color:var(--text)">${q.title}</div>
        <div style="font-size:11px;color:var(--text3)">${q.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── VOKABELN ─────────────────────────────────────────────────────────────────
function renderVokabeln(app){
  const vocab=getVocab();
  const due=vocab.filter(isDue).length;
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:6px">
      <button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button>
      <div><div style="font-size:11px;color:var(--text3)">LERNEN</div><div style="font-size:20px;font-weight:800;color:var(--text)">Vokabeln</div></div>
      <button onclick="showAddVocab()" class="gold-btn" style="width:auto;padding:8px 16px;margin-left:auto;font-size:13px">+ Hinzufügen</button>
    </div>
    ${due>0?`<div onclick="subView='karten';render()" style="background:linear-gradient(135deg,#1a2f1a,#0d1a0d);border:1px solid #22c55e;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer"><div><div style="font-size:13px;font-weight:700;color:#4ade80">🔔 ${due} Wiederholungen fällig</div><div style="font-size:11px;color:var(--text3)">Tippe um zu lernen</div></div><div style="font-size:24px;font-weight:800;color:#4ade80">${due}</div></div>`:''}
    <input placeholder="🔍 Suchen..." oninput="filterVocab(this.value)" style="margin-bottom:14px"/>
    <div id="vocabList">${vocab.map(v=>vocabCard(v)).join('')}</div>
  </div>`;
}

function vocabCard(v){
  const tr=getTr(v), exTr=getExTr(v);
  const sc=v.status==='gelernt'?'#4ade80':v.status==='lernend'?'#60a5fa':'var(--text3)';
  const sb=v.status==='gelernt'?'#14532d':v.status==='lernend'?'#1e3a5f':'var(--bg3)';
  const isAdj=(v.wordType||'').toLowerCase().includes('adj');
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3)">${v.wordType||''}</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-top:2px">${tr}</div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          <div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">مفرد</div><div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div></div>
          ${v.plural&&v.plural!=='-'?`<div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">جمع</div><div class="ar" style="font-size:24px;color:#a78bfa;font-weight:700">${v.pluralHarakat||v.plural}</div></div>`:''}
          ${isAdj&&v.opposite&&v.opposite!==''?`<div><div style="font-size:10px;color:var(--text3);margin-bottom:2px">ضد</div><div class="ar" style="font-size:24px;color:#60a5fa;font-weight:700">${v.oppHarakat||v.opposite}</div></div>`:''}
        </div>
        ${v.exampleArabic?`<div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:10px"><div class="ar" style="font-size:16px;color:var(--text);line-height:1.9">${v.exampleArabic}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${exTr}</div></div>`:''}
        <button onclick="showVocabMehr(${v.id})" style="margin-top:10px;background:none;border:1px solid #3b2d6e;border-radius:10px;padding:8px 14px;color:#a78bfa;font-size:12px;font-weight:700;cursor:pointer;width:100%">🔍 Kontext & Mehr anzeigen</button>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <span style="background:${sb};color:${sc};border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700">${v.status||'neu'}</span>
        <button onclick="deleteVocab(${v.id})" style="background:#3b1a1a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer">Löschen</button>
      </div>
    </div>
  </div>`;
}

async function showVocabMehr(id){
  const v=getVocab().find(x=>x.id===id); if(!v)return;
  const m=document.createElement('div'); m.className='overlay';
  m.innerHTML=`<div class="sheet" style="max-height:85vh">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div class="ar" style="font-size:24px;color:var(--gold);font-weight:700">${v.harakat||v.arabic}</div><div style="font-size:13px;color:var(--text3)">${getTr(v)}</div></div>
      <button onclick="this.closest('.overlay').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div id="vocabMehrContent" style="text-align:center;padding:20px;color:var(--text3)">
      <div style="font-size:13px;margin-bottom:20px">Lade Kontext für <span class="ar" style="color:var(--gold)">${v.arabic}</span>...</div>
      <div style="font-size:24px">⏳</div>
    </div>
  </div>`;
  document.body.appendChild(m);
  try{
    const raw=await callAI(`For Arabic word "${v.arabic}" (${getTr(v)}): All meanings in different contexts and related words from same root. ONLY JSON:
{"bedeutungen":[{"kontext":"context label","arabisch":"with diacritics","deutsch":"meaning","beispiel":"example with diacritics"}],"verwandte":[{"arabisch":"with diacritics","deutsch":"meaning","wortart":"Nomen/Verb/Adjektiv"}]}`,800);
    const p=pJ(raw);
    const el=document.getElementById('vocabMehrContent');
    if(p&&el){
      el.innerHTML=`<div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:12px;text-align:left">BEDEUTUNGEN & KONTEXT</div>
      ${(p.bedeutungen||[]).map(b=>`<div style="background:var(--bg3);border:1px solid #3b2d6e;border-radius:14px;padding:14px;margin-bottom:10px;text-align:left">
        <div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:6px">${b.kontext}</div>
        <div class="ar" style="font-size:20px;color:var(--gold);margin-bottom:4px">${b.arabisch}</div>
        <div style="font-size:12px;color:var(--text3)">${b.deutsch}</div>
        ${b.beispiel?`<div class="ar" style="font-size:13px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.8">${b.beispiel}</div>`:''}
      </div>`).join('')}
      ${(p.verwandte||[]).length?`<div style="font-size:12px;font-weight:700;color:var(--text);margin:16px 0 10px;text-align:left">VERWANDTE WÖRTER (نفس الجذر)</div>
      ${p.verwandte.map(w=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;color:var(--text2)">${w.deutsch}</div><div style="font-size:11px;color:var(--text3)">${w.wortart}</div></div>
        <div class="ar" style="font-size:22px;color:#60a5fa;font-weight:700">${w.arabisch}</div>
      </div>`).join('')}`:''}`;
    } else if(el){ el.innerHTML='<div style="color:#ef4444">KI Fehler.</div>'; }
  }catch(e){
    const el=document.getElementById('vocabMehrContent');
    if(el) el.innerHTML=`<div style="color:#ef4444">Fehler: ${e.message}</div>`;
  }
}

function filterVocab(q){
  const vocab=getVocab();
  const filtered=vocab.filter(v=>v.arabic.includes(q)||getTr(v).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('vocabList').innerHTML=filtered.map(v=>vocabCard(v)).join('');
}
function deleteVocab(id){ setVocab(getVocab().filter(v=>v.id!==id)); renderVokabeln(document.getElementById('app')); }

function showAddVocab(){
  const m=document.createElement('div'); m.className='overlay';
  m.innerHTML=`<div class="sheet"><div style="display:flex;justify-content:space-between;margin-bottom:18px"><div style="font-size:18px;font-weight:800;color:var(--text)">Vokabel hinzufügen</div><button onclick="this.closest('.overlay').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px">✕</button></div>
    <input id="arIn" placeholder="Arabisches Wort..." class="ar" style="font-size:22px;margin-bottom:10px;color:var(--gold)"/>
    <input id="trIn" placeholder="Übersetzung (optional)" style="margin-bottom:14px"/>
    <button class="gold-btn" onclick="addVocab()" id="addVBtn">Karte erstellen</button>
  </div>`;
  document.body.appendChild(m);
}

async function addVocab(){
  const ar=document.getElementById('arIn').value.trim();
  const tr=document.getElementById('trIn').value.trim();
  if(!ar)return;
  const btn=document.getElementById('addVBtn');
  btn.textContent='KI ergänzt...'; btn.disabled=true;
  try{
    const raw=await callAI(`For Arabic word "${ar}" (hint: "${tr||'translate'}"): Reply ONLY with JSON:
{"arabic":"${ar}","harakat":"word with FULL diacritics including tanwin e.g. كِتَابٌ","translations":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"},"wordType":"Nomen/Verb/Adjektiv/etc","opposite":"Arabic opposite WITH diacritics only if Adjektiv else empty string","oppHarakat":"opposite with diacritics or empty","plural":"Arabic plural WITH diacritics or -","pluralHarakat":"plural with diacritics or -","exampleArabic":"example sentence with FULL diacritics","exampleTranslation":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"}}`);
    const p=pJ(raw);
    if(p){ setVocab([{...p,id:Date.now(),status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},...getVocab()]); document.querySelector('.overlay').remove(); addXP(5); renderVokabeln(document.getElementById('app')); }
    else{alert('KI Fehler');btn.textContent='Karte erstellen';btn.disabled=false;}
  }catch(e){alert('Fehler: '+e.message);btn.textContent='Karte erstellen';btn.disabled=false;}
}

// ── KARTEN (Spaced Repetition) ────────────────────────────────────────────────
let lP=[],lI=0,lF=false,lS={p:0,g:0,s:0},lD=false,lFilter='fällig';
const RATES=[{l:ui('never'),c:'#ef4444',s:0},{l:ui('ok'),c:'#eab308',s:2},{l:ui('perfect'),c:'#a3e635',s:5}];

function renderKarten(app){
  lP=buildPool(getVocab(),lFilter); lI=0; lF=false; lS={p:0,g:0,s:0}; lD=false;
  showCard(app);
}
function showCard(app){
  const fb=['fällig','alle','neu','lernend','gelernt'].map(f=>`<button onclick="lFilter='${f}';renderKarten(document.getElementById('app'))" style="background:${lFilter===f?'var(--gold)':'var(--bg3)'};border:1px solid ${lFilter===f?'var(--gold)':'var(--border)'};color:${lFilter===f?'#080c14':'var(--text2)'};border-radius:10px;padding:6px 10px;font-weight:700;font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('');
  if(lD){
    app.innerHTML=`<div style="padding:20px 16px 100px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Session abgeschlossen! 🏆</div></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">${[['Perfekt','p','#a3e635'],['Gut','g','#F59E0B'],['Schlecht','s','#ef4444']].map(([l,k,c])=>`<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:900;color:${c}">${lS[k]}</div><div style="font-size:11px;color:var(--text3)">${l}</div></div>`).join('')}</div>
    ${lS.s>0?`<div style="background:#1a1000;border:1px solid #92400e;border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--gold)">Schlechte Karten kommen öfter wieder.</div>`:''}
    <button class="gold-btn" onclick="renderKarten(document.getElementById('app'))">Nochmal lernen</button></div>`; return;
  }
  if(!lP.length){
    app.innerHTML=`<div style="padding:20px 16px 100px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Lernkarten</div></div>
    <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${fb}</div>
    <div style="text-align:center;color:var(--text3);padding:60px 0;font-size:15px">Keine Karten.</div></div>`; return;
  }
  const card=lP[lI];
  const tr=getTr(card), exTr=getExTr(card);
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:6px">
      <button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button>
      <div style="font-size:20px;font-weight:800;color:var(--text)">Lernkarten</div>
      <div style="font-size:13px;font-weight:700;color:var(--gold);margin-left:auto">${lI+1}/${lP.length}</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">${fb}</div>
    <div style="background:var(--bg3);border-radius:4px;height:4px;margin-bottom:16px"><div style="width:${((lI+1)/lP.length)*100}%;background:${(card.failCount||0)>1?'#ef4444':'var(--gold)'};height:4px;border-radius:4px;transition:width 0.4s"></div></div>
    <div onclick="lF=!lF;showCard(document.getElementById('app'))" style="background:var(--bg2);border:1px solid ${(card.failCount||0)>1?'#7f1d1d':'var(--border)'};border-radius:20px;padding:24px;min-height:260px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;margin-bottom:14px">
      ${!lF?`${(card.failCount||0)>0?`<div style="font-size:10px;color:#f97316;margin-bottom:10px;font-weight:700">SCHWIERIG – ${card.failCount}x falsch</div>`:''}
      <div style="font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:18px">Tippen zum Umdrehen</div>
      <div class="ar" style="font-size:58px;color:var(--gold);font-weight:700;line-height:1.4;margin-bottom:10px">${card.harakat||card.arabic}</div>
      <div style="font-size:12px;color:var(--text3)">${card.wordType||''}</div>`
      :`<div style="width:100%">
        <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:18px">${tr}</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
          ${card.plural&&card.plural!=='-'?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">جمع</div><div class="ar" style="font-size:20px;color:#a78bfa">${card.pluralHarakat||card.plural}</div></div>`:''}
          ${(card.wordType||'').toLowerCase().includes('adj')&&card.opposite&&card.opposite!==''?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">ضد</div><div class="ar" style="font-size:20px;color:#60a5fa">${card.oppHarakat||card.opposite}</div></div>`:''}
        </div>
        ${card.exampleArabic?`<div style="background:var(--bg3);border-radius:12px;padding:14px"><div class="ar" style="font-size:18px;color:var(--text);line-height:2;margin-bottom:6px">${card.exampleArabic}</div><div style="font-size:12px;color:var(--text3)">${exTr}</div></div>`:''}</div>`}
    </div>
    ${lF?`<div><div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px">Wie gut kanntest du das Wort?</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">${RATES.map(r=>`<button onclick="rateCard(${r.s})" style="background:var(--bg2);border:1px solid ${r.c}44;border-radius:14px;padding:14px 6px;cursor:pointer;text-align:center"><div style="font-size:14px;font-weight:800;color:${r.c}">${r.l}</div>${r.s<2?'<div style="font-size:9px;color:var(--text3);margin-top:2px">öfter</div>':r.s>=4?'<div style="font-size:9px;color:var(--text3);margin-top:2px">seltener</div>':''}</button>`).join('')}</div>
    <button onclick="lF=false;lI++;if(lI>=lP.length){lD=true;}showCard(document.getElementById('app'))" style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;width:100%;color:var(--text2);font-weight:700;cursor:pointer">Überspringen</button></div>`:''}`
}
function rateCard(score){
  const card=lP[lI];
  const updated=calcNext(card,score);
  setVocab(getVocab().map(v=>v.id===card.id?updated:v));
  if(score>=4)lS.p++;else if(score>=2)lS.g++;else lS.s++;
  addXP(score>=4?10:score>=2?5:2);
  lI++; lF=false;
  if(lI>=lP.length){lD=true;updateStreak();}
  showCard(document.getElementById('app'));
}

function showVerbDetail(id){
  const verb=getVerbs().find(v=>v.id===id); if(!verb)return;
  let vt=activeTense;
  let mehrData=null;
  let mehrLoading=false;

  function draw(){
    const tc=TENSES.find(x=>x.key===vt);
    const existing=document.getElementById('verbModal'); if(existing)existing.remove();
    const m=document.createElement('div'); m.id='verbModal';
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:150;display:flex;flex-direction:column;overflow:hidden';
    m.innerHTML=`
    <div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div><div style="font-size:11px;color:var(--text3)">VERB</div><div class="ar" style="font-size:26px;color:var(--gold);font-weight:700">${verb.arabic}</div><div style="font-size:13px;color:var(--text2)">${getTr(verb)}</div></div>
      <button onclick="document.getElementById('verbModal').remove()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div style="display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto">
      ${TENSES.map(tn=>`<div onclick="vt='${tn.key}';draw()" style="flex-shrink:0;padding:12px 14px;cursor:pointer;border-bottom:${vt===tn.key?`3px solid ${tn.color}`:'3px solid transparent'};background:${vt===tn.key?'var(--bg2)':'transparent'};-webkit-tap-highlight-color:transparent">
        <div style="font-size:10px;font-weight:700;color:${vt===tn.key?tn.color:'var(--text3)'};white-space:nowrap">${tn.label.toUpperCase()}</div>
        <div class="ar" style="font-size:13px;color:${vt===tn.key?tn.color:'var(--text3)'};text-align:right">${tn.ar}</div>
      </div>`).join('')}
      <div onclick="showMehr()" style="flex-shrink:0;padding:12px 14px;cursor:pointer;border-bottom:${vt==='mehr'?'3px solid #a78bfa':'3px solid transparent'};background:${vt==='mehr'?'var(--bg2)':'transparent'};-webkit-tap-highlight-color:transparent">
        <div style="font-size:10px;font-weight:700;color:${vt==='mehr'?'#a78bfa':'var(--text3)'};white-space:nowrap">MEHR</div>
        <div style="font-size:13px;color:${vt==='mehr'?'#a78bfa':'var(--text3)'};text-align:center">＋</div>
      </div>
    </div>
    <div id="verbContent" style="flex:1;overflow-y:auto;padding:16px">
      ${vt==='mehr'?renderMehrContent():renderTenseContent(tc,verb)}
    </div>`;
    document.body.appendChild(m);
  }

  function renderTenseContent(tc,verb){
    return `<div style="font-size:12px;font-weight:700;color:${tc.color};margin-bottom:12px">${tc.label}</div>
    ${(verb.konjugation?.[vt]||[]).map(f=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:11px;color:var(--text3)">${f.p} · ${f.d}</div>
      <div class="ar" style="font-size:26px;color:${tc.color};font-weight:700">${f.a}</div>
    </div>`).join('')}
    ${verb.konjugation?.beispiele?.length?`<div style="font-size:12px;font-weight:700;color:var(--text);margin:20px 0 10px">BEISPIELSÄTZE</div>${verb.konjugation.beispiele.map(b=>`<div class="card"><div class="ar" style="font-size:18px;color:var(--text);line-height:1.9;margin-bottom:6px">${b.a}</div><div style="font-size:12px;color:var(--text3)">${b.d}</div></div>`).join('')}`:''}
    ${verb.konjugation?.merksatz?`<div style="background:linear-gradient(135deg,#1a1f3a,#0d1226);border:1px solid #2d3a6e;border-radius:14px;padding:16px;margin-top:16px"><div style="font-size:12px;font-weight:700;color:#60a5fa;margin-bottom:8px">📚 WORTSTAMM & MERKHILFE</div><div style="font-size:13px;color:#93c5fd;line-height:1.6">${verb.konjugation.merksatz}</div></div>`:''}`;
  }

  function renderMehrContent(){
    if(mehrLoading) return `<div style="text-align:center;padding:40px;color:var(--text3)">KI lädt Kontext-Bedeutungen...</div>`;
    if(!mehrData) return `<div style="text-align:center;padding:40px">
      <div style="font-size:14px;color:var(--text3);margin-bottom:16px">Entdecke alle Bedeutungen und Kontexte von <span class="ar" style="color:var(--gold);font-size:18px">${verb.arabic}</span></div>
      <button onclick="loadMehr()" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:12px;padding:14px 24px;color:white;font-weight:700;font-size:14px;cursor:pointer">🔍 Kontext laden</button>
    </div>`;
    return `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:12px">BEDEUTUNGEN & KONTEXT</div>
      ${mehrData.bedeutungen?.map(b=>`<div style="background:var(--bg2);border:1px solid #3b2d6e;border-radius:14px;padding:14px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:#a78bfa;margin-bottom:6px">${b.kontext}</div>
        <div class="ar" style="font-size:20px;color:var(--gold);margin-bottom:4px">${b.arabisch}</div>
        <div style="font-size:12px;color:var(--text3)">${b.deutsch}</div>
        ${b.beispiel?`<div class="ar" style="font-size:14px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${b.beispiel}</div>`:''}
      </div>`).join('')||''}
      ${mehrData.verwandte?.length?`<div style="font-size:12px;font-weight:700;color:var(--text);margin:16px 0 10px">VERWANDTE WÖRTER (نفس الجذر)</div>
      ${mehrData.verwandte.map(w=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;color:var(--text3)">${w.deutsch}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${w.wortart}</div></div>
        <div class="ar" style="font-size:22px;color:#60a5fa;font-weight:700">${w.arabisch}</div>
      </div>`).join('')}`:''}
    </div>`;
  }

  async function loadMehr(){
    mehrLoading=true;
    const c=document.getElementById('verbContent');
    if(c) c.innerHTML=renderMehrContent();
    try{
      const raw=await callAI(`For the Arabic verb "${verb.arabic}" (${getTr(verb)}): Give ALL meanings in different contexts and related words from the same root. ONLY JSON:
{"bedeutungen":[{"kontext":"Context label e.g. 'Im übertragenen Sinne'","arabisch":"example with diacritics","deutsch":"German meaning","beispiel":"example sentence with diacritics"},{"kontext":"another context","arabisch":"","deutsch":"","beispiel":""}],"verwandte":[{"arabisch":"related word with diacritics","deutsch":"meaning","wortart":"Nomen/Adjektiv/etc"},{"arabisch":"","deutsch":"","wortart":""}]}`,1000);
      const p=pJ(raw);
      if(p){ mehrData=p; mehrLoading=false; if(c) c.innerHTML=renderMehrContent(); }
      else { mehrLoading=false; if(c) c.innerHTML='<div style="color:#ef4444;padding:20px;text-align:center">KI Fehler. Nochmal versuchen.</div>'; }
    }catch(e){ mehrLoading=false; if(c) c.innerHTML=`<div style="color:#ef4444;padding:20px;text-align:center">Fehler: ${e.message}</div>`; }
  }

  function showMehr(){ vt='mehr'; draw(); if(!mehrData&&!mehrLoading) {} }
  window.draw=draw; window.loadMehr=loadMehr; window.showMehr=showMehr;
  draw();
}

{"arabic":"${ar} with full diacritics e.g. ذَهَبَ","translations":{"de":"German","en":"English","ru":"Russian","ur":"Urdu"},"konjugation":{"vergangenheit":[{"p":"هُوَ","a":"full diacritics","d":""},{"p":"هِيَ","a":"","d":""},{"p":"هُمَا","a":"","d":""},{"p":"هُمَا(f)","a":"","d":""},{"p":"هُمْ","a":"","d":""},{"p":"هُنَّ","a":"","d":""},{"p":"أَنَا","a":"","d":""},{"p":"نَحْنُ","a":"","d":""},{"p":"أَنْتَ","a":"","d":""},{"p":"أَنْتِ","a":"","d":""},{"p":"أَنْتُمَا","a":"","d":""},{"p":"أَنْتُمْ","a":"","d":""},{"p":"أَنْتُنَّ","a":"","d":""}],"gegenwart":[{"p":"هُوَ","a":"","d":""},{"p":"هِيَ","a":"","d":""},{"p":"هُمَا","a":"","d":""},{"p":"هُمَا(f)","a":"","d":""},{"p":"هُمْ","a":"","d":""},{"p":"هُنَّ","a":"","d":""},{"p":"أَنَا","a":"","d":""},{"p":"نَحْنُ","a":"","d":""},{"p":"أَنْتَ","a":"","d":""},{"p":"أَنْتِ","a":"","d":""},{"p":"أَنْتُمَا","a":"","d":""},{"p":"أَنْتُمْ","a":"","d":""},{"p":"أَنْتُنَّ","a":"","d":""}],"zukunft":[{"p":"هُوَ","a":"","d":""},{"p":"هِيَ","a":"","d":""},{"p":"هُمَا","a":"","d":""},{"p":"هُمَا(f)","a":"","d":""},{"p":"هُمْ","a":"","d":""},{"p":"هُنَّ","a":"","d":""},{"p":"أَنَا","a":"","d":""},{"p":"نَحْنُ","a":"","d":""},{"p":"أَنْتَ","a":"","d":""},{"p":"أَنْتِ","a":"","d":""},{"p":"أَنْتُمَا","a":"","d":""},{"p":"أَنْتُمْ","a":"","d":""},{"p":"أَنْتُنَّ","a":"","d":""}],"befehl":[{"p":"أَنْتَ","a":"","d":""},{"p":"أَنْتِ","a":"","d":""},{"p":"أَنْتُمَا","a":"","d":""},{"p":"أَنْتُمْ","a":"","d":""},{"p":"أَنْتُنَّ","a":"","d":""}],"beispiele":[{"a":"full diacritics","d":""},{"a":"","d":""},{"a":"","d":""}],"merksatz":"Explain the Arabic root (جذر) of this verb, what letters form it, other words from same root, and a memory tip. E.g. for ذهب: Root is ذ-ه-ب (also means gold ذَهَب). Related: مَذْهَب (school of thought), ذَهَاب (going away)."}}`,2000);
    const p=pJ(raw);
    if(p){setVerbs([{...p,id:Date.now()},...getVerbs()]);document.querySelector('.overlay').remove();renderVerben(document.getElementById('app'));}
    else{alert('KI Fehler');btn.textContent='Verb erstellen';btn.disabled=false;}
  }catch(e){alert('Fehler: '+e.message);btn.textContent='Verb erstellen';btn.disabled=false;}

      ${gMode==='wortart'?`<div style="font-size:11px;color:var(--text3);margin-bottom:14px">Was für eine Wortart ist das?</div><div class="ar" style="font-size:48px;color:var(--gold);font-weight:700;margin-bottom:8px">${q.harakat||q.arabic}</div><div style="font-size:14px;color:var(--text2)">${getTr(q)}</div>`:''}
      ${gMode==='schnell'?`<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:14px">⚡ SCHNELL!</div><div class="ar" style="font-size:48px;color:var(--gold);font-weight:700">${q.harakat||q.arabic}</div>`:''}
      ${gMode==='saetze'||gMode==='luecke'?`<div style="font-size:11px;color:var(--gold);margin-bottom:12px;font-weight:700">${gMode==='luecke'?'Ergänze das fehlende Wort:':q.dir==='ar2tr'?'Übersetze:':'Übersetze ins Arabische:'}</div><div class="${(gMode==='saetze'&&q.dir==='ar2tr')||gMode==='luecke'?'ar':''}" style="font-size:${(gMode==='saetze'&&q.dir==='ar2tr')||gMode==='luecke'?'22':'18'}px;color:var(--text);font-weight:600;line-height:1.6">${q.aufgabe}</div>${q.hinweis?`<div style="font-size:11px;color:var(--text3);margin-top:8px">Tipp: ${q.hinweis}</div>`:''}`:''}
      ${gMode==='kontext'?`<div style="font-size:11px;color:var(--gold);margin-bottom:12px;font-weight:700">Welches Wort passt?</div><div class="ar" style="font-size:20px;color:var(--text);font-weight:600;line-height:1.8;margin-bottom:10px">${q.aufgabe}</div>`:''}      ${gResult?`<div style="margin-top:14px;padding:10px 16px;background:${gResult==='correct'?'#14532d':'#7f1d1d'};border-radius:10px;width:100%"><div style="font-size:13px;font-weight:700;color:${gResult==='correct'?'#4ade80':'#fca5a5'}">${gResult==='correct'?'Richtig!':'Falsch'}</div>${gResult==='wrong'?`<div style="font-size:12px;color:#94a3b8;margin-top:4px">Richtig: ${gMode==='tr2ar'?`<span class="ar">${q.harakat||q.arabic}</span>`:gMode==='saetze'?q.loesung:qTr}</div>`:''}</div>`:''}
    </div>
    ${gMode==='mc'&&!gResult?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${gMC.map(opt=>`<div onclick="checkGame(${opt.id})" style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent"><div style="font-size:13px;color:var(--text);font-weight:600">${getTr(opt)}</div></div>`).join('')}</div>`:''} 
    ${gMode==='hoeren'&&!gResult?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${gMC.map(opt=>`<div onclick="checkGame(${opt.id})" style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent"><div class="ar" style="font-size:18px;color:var(--gold);font-weight:700">${opt.harakat||opt.arabic}</div></div>`).join('')}</div>`:''}
    ${gMode==='wortart'&&!gResult?`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${['Nomen','Verb','Adjektiv','Partikel'].map(w=>`<div onclick="checkGame('${w}')" style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 8px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent"><div style="font-size:13px;color:var(--text);font-weight:600">${w}</div></div>`).join('')}</div>`:''}
    ${gMode==='kontext'&&!gResult&&q.optionen?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${q.optionen.map(opt=>`<div onclick="checkGame('${opt}')" style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent"><div class="ar" style="font-size:18px;color:var(--gold);font-weight:700">${opt}</div></div>`).join('')}</div>`:''}

    ${gResult?`<button class="gold-btn" style="margin-top:12px" onclick="nextGame()">${gI+1>=gQ.length?'Ergebnis sehen':'Weiter →'}</button>`:''}`
}

async function startGame(mode){
  gMode=mode;gI=0;gScore=0;gDone=false;gResult=null;gAns='';
  const vocab=getVocab();
  if(vocab.length<4){alert('Mindestens 4 Vokabeln nötig!');gMode=null;renderSpiele(document.getElementById('app'));return;}
  renderSpiele(document.getElementById('app'));
  const sh=arr=>[...arr].sort(()=>Math.random()-0.5);

  if(['mc','ar2tr','tr2ar','hoeren','schnell','plural','wortart'].includes(mode)){
    gQ=sh(vocab).slice(0,10);
    if(mode==='mc'||mode==='hoeren'||mode==='paare')buildMC(0);
    if(mode==='hoeren'){ setTimeout(()=>speakAr(gQ[0].harakat||gQ[0].arabic),400); }
  } else if(mode==='paare'){
    gQ=sh(vocab).slice(0,6); buildMC(0);
  } else if(['saetze','luecke','kontext'].includes(mode)){
    try{
      const wl=sh(vocab).slice(0,6).map(v=>`${v.arabic} (${getTr(v)})`).join(', ');
      let prompt='';
      if(mode==='saetze') prompt=`Create 8 simple translation exercises (max 5 words) using: ${wl}. Alternate Arabic→${LANGS[lang].name} and ${LANGS[lang].name}→Arabic. ONLY JSON: [{"aufgabe":"sentence","dir":"ar2tr or tr2ar","loesung":"translation","hinweis":"hint"}]`;
      else if(mode==='luecke') prompt=`Create 8 fill-in-the-blank exercises using these Arabic words: ${wl}. Show an Arabic sentence with one word replaced by ___. User must type the missing word. ONLY JSON: [{"aufgabe":"Arabic sentence with ___","loesung":"the missing Arabic word with diacritics","hinweis":"hint: ${LANGS[lang].name} meaning","dir":"luecke"}]`;
      else if(mode==='kontext') prompt=`Create 8 context exercises: show an Arabic sentence, ask which word from a list fits best. Use words: ${wl}. ONLY JSON: [{"aufgabe":"Arabic sentence with blank","optionen":["word1","word2","word3","word4"],"loesung":"correct word with diacritics","hinweis":"context hint"}]`;
      const raw=await callAI(prompt,1500);
      const p=pJ(raw);
      if(Array.isArray(p)&&p.length>0){gQ=p;renderSpiele(document.getElementById('app'));}
      else{alert('KI Fehler');gMode=null;renderSpiele(document.getElementById('app'));}
    }catch{alert('KI Fehler');gMode=null;renderSpiele(document.getElementById('app'));}
  }
  renderSpiele(document.getElementById('app'));
}
function buildMC(idx){const vocab=getVocab();const c=gQ[idx];const w=[...vocab].sort(()=>Math.random()-0.5).filter(v=>v.id!==c.id).slice(0,3);gMC=[...[c,...w]].sort(()=>Math.random()-0.5);}
function checkGame(given){
  const q=gQ[gI]; const qTr=getTr(q)||''; let ok=false;
  if(gMode==='mc')ok=given===q.id;
  else if(gMode==='hoeren')ok=given===q.id;
  else if(gMode==='ar2tr'||gMode==='schnell')ok=String(given).toLowerCase().trim().includes(qTr.toLowerCase().split(',')[0].trim().slice(0,4));
  else if(gMode==='tr2ar')ok=String(given).trim()===q.arabic||String(given).trim()===(q.harakat||q.arabic)||q.arabic.includes(String(given).trim());
  else if(gMode==='plural'){ const pl=q.plural||''; ok=String(given).trim()===pl||String(given).trim()===(q.pluralHarakat||pl); }
  else if(gMode==='wortart')ok=String(given).toLowerCase().includes((q.wordType||'').toLowerCase().slice(0,4));
  else if(gMode==='saetze'){const l=q.loesung.toLowerCase();ok=String(given).toLowerCase().trim().length>2&&(l.includes(String(given).toLowerCase().trim().slice(0,4))||String(given).toLowerCase().includes(l.slice(0,4)));}
  else if(gMode==='luecke')ok=String(given).trim()===q.loesung||q.loesung.includes(String(given).trim().slice(0,4));
  else if(gMode==='kontext')ok=String(given).trim()===q.loesung||q.loesung.includes(String(given).trim().slice(0,3));
  gResult=ok?'correct':'wrong'; if(ok){gScore++;addXP(10);}
  renderSpiele(document.getElementById('app'));
}
function nextGame(){gI++;gResult=null;gAns='';if(gI>=gQ.length){gDone=true;}else if(gMode==='mc')buildMC(gI);renderSpiele(document.getElementById('app'));}

function renderKorrektor(app){
  app.innerHTML=`<div style="padding:20px 16px 100px">

    </div>

    <div class="card"><div style="font-size:11px;color:#4ade80;margin-bottom:8px;font-weight:700">KORRIGIERTER TEXT</div><div class="ar" style="font-size:22px;color:var(--text);line-height:1.9">${cResult.corrected}</div></div>
    ${cResult.corrections?.length?`<div class="card"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px">Korrekturen</div>${cResult.corrections.map(c=>`<div style="border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><span class="ar" style="background:#3b1a1a;color:#ef4444;border-radius:8px;padding:3px 10px;font-size:16px">${c.original}</span><span style="color:var(--text3)">→</span><span class="ar" style="background:#1a3b1a;color:#4ade80;border-radius:8px;padding:3px 10px;font-size:16px">${c.fixed}</span></div><div style="font-size:12px;color:var(--text2)">${c.explanation}</div></div>`).join('')}</div>`:''}`:''}
  </div>`;

async function correctText(){
  const input=document.getElementById('corrIn').value.trim(); if(!input)return;
  const btn=document.getElementById('corrBtn'); btn.textContent='KI korrigiert...'; btn.disabled=true;
  try{
    const raw=await callAI(`Correct this Arabic text: "${input}". ONLY JSON: {"corrected":"corrected with full diacritics","corrections":[{"original":"wrong","fixed":"correct","explanation":"explanation in ${LANGS[lang].name}"}],"level":"A1/A2/B1/B2/C1/C2"}`);
    const p=pJ(raw);
    if(p){cResult=p;renderKorrektor(document.getElementById('app'));}
    else{alert('KI Fehler');btn.textContent='Text korrigieren';btn.disabled=false;}
  }catch(e){alert('Fehler: '+e.message);btn.textContent='Text korrigieren';btn.disabled=false;}
}

async function startVoice(sceneId){
  vScene=sceneId; vMsgs=[]; vLoad=true;
  renderSprechen(document.getElementById('app'));
  const s=SCENES.find(x=>x.id===sceneId);
  const prompt=sceneId==='frei'
    ?`أنت شريك محادثة عربي. أجب باللغة العربية مع الشكل الكامل فقط. جمل بسيطة. ابدأ بتحية.`
    :`أنت في سيناريو: "${s.de}". أجب باللغة العربية مع الشكل الكامل. ابدأ في دورك بجملتين بسيطتين.`;
  try{
    const raw=await callAI(prompt,200);
    vMsgs=[{role:'ai',text:raw.trim()}];
    speakAr(raw.trim());
  }catch{vMsgs=[{role:'ai',text:'مرحباً! كيف حالك؟'}];}
  vLoad=false;
  renderSprechen(document.getElementById('app'));
}

function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Mikrofon wird nicht unterstützt');return;}
  const rec=new SR(); rec.lang='ar-SA'; rec.continuous=false; rec.interimResults=false;
  rec.onresult=e=>{
    const t=e.results[0][0].transcript;
    vRec=false;
    // Show text in input first, then send
    renderSprechen(document.getElementById('app'));
    setTimeout(()=>{
      const inp=document.getElementById('vIn');
      if(inp) inp.value=t;
      window._sendV(t);
    },100);
  };
  rec.onerror=e=>{console.log('rec error',e.error);vRec=false;renderSprechen(document.getElementById('app'));};
  rec.onend=()=>{if(vRec){vRec=false;renderSprechen(document.getElementById('app'));}};
  vRecObj=rec; rec.start(); vRec=true;
  renderSprechen(document.getElementById('app'));
}
function stopRec(){if(vRecObj)vRecObj.stop();vRec=false;renderSprechen(document.getElementById('app'));}

window._sendV = function(text){ sendVoice(text); };

async function sendVoice(text){
  if(!text.trim()||vLoad)return;
  const inp=document.getElementById('vIn'); if(inp)inp.value='';
  vMsgs.push({role:'user',text:text.trim()});
  vLoad=true; renderSprechen(document.getElementById('app'));
  try{
    const [fbRaw,replyRaw]=await Promise.all([
      callAI(`Analyze Arabic learner sentence: "${text.trim()}". ONLY JSON: {"correct":true,"corrected":"with full diacritics or same","tip":"tip in German or empty"}`,300),
      callAI(`Conversation (${vScene}):\n${vMsgs.map(m=>`${m.role==='user'?'Lernender':'KI'}: ${m.text}`).join('\n')}\nReply in Arabic with full diacritics. Max 2 short sentences.`,200)
    ]);
    const fb=pJ(fbRaw);
    if(fb)vMsgs[vMsgs.length-1].fb=fb;
    const reply=replyRaw.trim();
    vMsgs.push({role:'ai',text:reply});
    speakAr(reply);
  }catch{vMsgs.push({role:'ai',text:'أعد المحاولة.'});}
  vLoad=false; renderSprechen(document.getElementById('app'));
}

function speakAr(text){
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ar-SA'; u.rate=0.85; u.pitch=1;
    const vs=speechSynthesis.getVoices();
    const av=vs.find(v=>v.lang.startsWith('ar'));
    if(av)u.voice=av;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch{}
}

    </div>

    <button onclick="addNewProject()" style="background:none;border:2px dashed var(--border);border-radius:14px;padding:14px;width:100%;color:var(--text3);cursor:pointer;font-size:14px;font-weight:600;margin-bottom:20px">+ Neues Projekt</button>
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Sprache</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
      ${Object.entries(LANGS).map(([code,l])=>`<div onclick="changeLang('${code}')" style="background:${lang===code?'var(--gold)':'var(--bg2)'};color:${lang===code?'#080c14':'var(--text)'};border:1px solid ${lang===code?'var(--gold)':'var(--border)'};border-radius:12px;padding:12px;cursor:pointer;font-weight:600;font-size:13px;text-align:center;-webkit-tap-highlight-color:transparent">${l.flag} ${l.name}</div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Erscheinungsbild</div>

function addNewProject(){
  const name=prompt('Projektname:','Thema '+(projects.length+1));
  if(!name)return; projects.push({id:Date.now(),name,vocab:[],verbs:[]}); saveProjects(); render();
}
function changeLang(code){
  lang=code; localStorage.setItem('lang',code); render();
}
function toggleTheme(){
  theme=theme==='dark'?'light':'dark'; localStorage.setItem('theme',theme);
  document.documentElement.setAttribute('data-theme',theme); render();
}
function renderStats(app){
  const vocab=getVocab();
  const gelernt=vocab.filter(v=>v.status==='gelernt').length;
  const lernend=vocab.filter(v=>v.status==='lernend').length;
  const neu=vocab.filter(v=>v.status==='neu').length;
  const total=vocab.length;
  app.innerHTML=`<div style="padding:20px 16px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:6px"><button onclick="subView=null;render()" style="background:var(--bg3);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px">←</button><div style="font-size:20px;font-weight:800;color:var(--text)">Statistiken</div></div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
        <div><div style="font-size:30px;font-weight:900;color:var(--gold)">${streak.days}</div><div style="font-size:10px;color:#78716c">Streak</div></div>
        <div><div style="font-size:30px;font-weight:900;color:var(--gold)">${streak.longest}</div><div style="font-size:10px;color:#78716c">Rekord</div></div>
        <div><div style="font-size:30px;font-weight:900;color:var(--gold)">${streak.totalXP||0}</div><div style="font-size:10px;color:#78716c">XP</div></div>
      </div>
    </div>
    <div class="card">${total===0?'<div style="color:var(--text3);text-align:center;padding:20px">Noch keine Vokabeln</div>':
      [['Gelernt',gelernt,'#a3e635'],['Lernend',lernend,'#60a5fa'],['Neu',neu,'var(--text3)']].map(([l,v,c])=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">${l}</span><span style="color:${c};font-weight:700">${v}</span></div><div style="background:var(--bg3);border-radius:4px;height:8px"><div style="width:${total?Math.round(v/total*100):0}%;background:${c};height:8px;border-radius:4px"></div></div></div>`).join('')
    }</div>
  </div>`;
}
// BOOT
render();
</script>
