<script>
const AI=async(p)=>{const r=await fetch('/.netlify/functions/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,maxTokens:1500})});const d=await r.json();return d.text||''};
const pJ=t=>{try{const c=t.replace(/```json|```/g,'').trim();const a=c.indexOf('[')!==-1&&(c.indexOf('['))<(c.indexOf('{')===-1?9999:c.indexOf('{'));const s=a?'[':'{';const e=a?']':'}';return JSON.parse(c.slice(c.indexOf(s),c.lastIndexOf(e)+1))}catch{return null}};
const VOCAB=[
{id:1,arabic:'كِتَاب',harakat:'كِتَاب',german:'Buch',wordType:'Nomen',opposite:'لا شيء',plural:'كُتُب',exampleArabic:'هَذَا كِتَابٌ جَمِيل',exampleGerman:'Das ist ein schönes Buch.',status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},
{id:2,arabic:'بَيْت',harakat:'بَيْت',german:'Haus',wordType:'Nomen',opposite:'شَارِع',plural:'بُيُوت',exampleArabic:'أنَا فِي الْبَيْت',exampleGerman:'Ich bin zu Hause.',status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},
{id:3,arabic:'ذَهَب',harakat:'ذَهَبَ',german:'gehen',wordType:'Verb',opposite:'جَاءَ',plural:'-',exampleArabic:'ذَهَبَ إِلَى الْمَدْرَسَة',exampleGerman:'Er ging zur Schule.',status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},
{id:4,arabic:'كَبِير',harakat:'كَبِير',german:'groß',wordType:'Adjektiv',opposite:'صَغِير',plural:'-',exampleArabic:'الْبَيتُ كَبِير',exampleGerman:'Das Haus ist groß.',status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()},
{id:5,arabic:'مَاء',harakat:'مَاء',german:'Wasser',wordType:'Nomen',opposite:'نَار',plural:'مِيَاه',exampleArabic:'أُرِيدُ مَاءً بَارِدًا',exampleGerman:'Ich möchte kaltes Wasser.',status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()}
];

let streak={days:0,lastDate:'',longestStreak:0};
try{const s=JSON.parse(localStorage.getItem('streak_v2')||'{}');streak={days:s.days||0,lastDate:s.lastDate||'',longestStreak:s.longestStreak||0}}catch{}
function updateStreak(){const today=new Date().toISOString().slice(0,10);if(streak.lastDate===today)return;const y=new Date();y.setDate(y.getDate()-1);const yk=y.toISOString().slice(0,10);streak.days=streak.lastDate===yk?streak.days+1:1;streak.lastDate=today;streak.longestStreak=Math.max(streak.longestStreak,streak.days);try{localStorage.setItem('streak_v2',JSON.stringify(streak))}catch{}}
updateStreak();
function isDue(c){return!c.nextReview||Date.now()>=c.nextReview}
function calcNext(card,score){let{interval=1,easeFactor=2.5,repetitions=0,failCount=0}=card;let fc=failCount;if(score<3){repetitions=0;fc=Math.min(failCount+1,5);interval=1}else{fc=Math.max(0,failCount-1);if(repetitions===0)interval=1;else if(repetitions===1)interval=6;else interval=Math.round(interval*easeFactor);repetitions+=1}easeFactor=Math.max(1.3,easeFactor+0.1-(5-score)*(0.08+(5-score)*0.02));const pf=fc>0?Math.max(0.3,1-fc*0.15):1;const ai=score<3?interval:Math.max(1,Math.round(interval*pf));const nr=Date.now()+ai*24*60*60*1000;const st=score>=4?'gelernt':score>=2?'lernend':'neu';return{...card,interval:ai,easeFactor,repetitions,nextReview:nr,status:st,lastScore:score,failCount:fc}}
function render(){const app=document.getElementById('app');const nav=document.getElementById('navbar');const due=vocab.filter(isDue).length;
nav.innerHTML=`${['sammlung','lernen','verben','korrektor'].map(t=>`<button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;position:relative" onclick="setTab('${t}')"><span style="font-size:9px;font-weight:600;letter-spacing:0.3px;color:${currentTab===t?'#F59E0B':'#475569'}">${t==='sammlung'?'VOKABELN':t==='lernen'?'LERNEN':t==='verben'?'VERBEN':'KORREKTUR'}</span>${currentTab===t?'<div style="width:16px;height:2px;background:#F59E0B;border-radius:2px;margin-top:2px"></div>':''}${t==='lernen'&&due>0?`<div style="position:absolute;top:0;right:18%;background:#ef4444;color:white;border-radius:50%;width:14px;height:14px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center">${due}</div>`:''}</button>`).join('')}`;
if(currentTab==='sammlung')renderSammlung(app);
else if(currentTab==='lernen')renderLernen(app);
else if(currentTab==='verben')renderVerben(app);
else renderKorrektor(app)}

function streakBanner(){const f=streak.days>=30?'🔥🔥🔥':streak.days>=14?'🔥🔥':'🔥';const m=streak.days===0?'Fang heute an!':streak.days===1?'Tag 1 – Super Start!':`${streak.days} Tage in Folge!`;return`<div style="background:linear-gradient(135deg,#1a1a0a,#2a1f00);border:1px solid #92400e;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:800;color:#F59E0B">${f} ${m}</div><div style="font-size:11px;color:#78716c;margin-top:2px">Längster Streak: ${streak.longestStreak} Tage</div></div><div style="text-align:right"><div style="font-size:32px;font-weight:900;color:#F59E0B;line-height:1">${streak.days}</div><div style="font-size:9px;color:#78716c;letter-spacing:1px">TAGE</div></div></div>`}
function renderSammlung(app){const due=vocab.filter(isDue).length;app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase">Arabisch</div><div style="font-size:22px;font-weight:800">Meine Vokabeln</div></div><button class="gold-btn" style="width:auto;padding:10px 18px" onclick="showAddModal()">+ Hinzufügen</button></div>${streakBanner()}${due>0?`<div style="background:linear-gradient(135deg,#1a2f1a,#0d1a0d);border:1px solid #166534;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700;color:#4ade80">Wiederholung fällig</div><div style="font-size:12px;color:#64748b">${due} Karten bereit</div></div><div style="font-size:24px;font-weight:800;color:#4ade80">${due}</div></div>`:''}<input placeholder="Suchen..." oninput="filterVocab(this.value)" style="margin-bottom:14px"/>${vocab.map(v=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;color:#64748b">${v.wordType}</div><div style="font-size:13px;color:#94a3b8;margin-top:2px">${v.german}</div>${v.interval>1?`<div style="font-size:10px;color:#475569;margin-top:3px">in ${v.interval}d</div>`:''}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><span style="background:${v.status==='gelernt'?'#14532d':v.status==='lernend'?'#1e3a5f':'#1a2540'};color:${v.status==='gelernt'?'#4ade80':v.status==='lernend'?'#60a5fa':'#64748b'};border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700">${v.status}</span><div class="ar" style="font-size:26px;color:#F59E0B;font-weight:700">${v.harakat||v.arabic}</div><button onclick="deleteVocab(${v.id})" style="background:#3b1a1a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer">Löschen</button></div></div></div>`).join('')}</div>`}
function filterVocab(q){const list=document.querySelectorAll('#app .card');const filtered=vocab.filter(v=>v.arabic.includes(q)||v.german.toLowerCase().includes(q.toLowerCase()));list.forEach((c,i)=>{c.style.display=vocab[i]&&(vocab[i].arabic.includes(q)||vocab[i].german.toLowerCase().includes(q.toLowerCase()))?'block':'none'})}
function deleteVocab(id){vocab=vocab.filter(v=>v.id!==id);render()}
function showAddModal(){const m=document.createElement('div');m.id='modal';m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end';m.innerHTML=`<div style="background:#0d1526;border:1px solid #1e2d4a;border-radius:24px 24px 0 0;width:100%;padding:24px;max-height:85vh;overflow-y:auto"><div style="display:flex;justify-content:space-between;margin-bottom:18px"><div style="font-size:18px;font-weight:800">Vokabel hinzufügen</div><button onclick="closeModal()" style="background:#1a2540;border:none;color:#94a3b8;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px">✕</button></div><input id="arInput" placeholder="Arabisches Wort..." class="ar" style="font-size:22px;margin-bottom:10px;color:#F59E0B"/><input id="deInput" placeholder="Deutsche Übersetzung (optional)" style="margin-bottom:14px"/><button class="gold-btn" onclick="addVocab()" id="addBtn">Karte erstellen</button></div>`;document.body.appendChild(m)}
function closeModal(){const m=document.getElementById('modal');if(m)m.remove()}
async function addVocab(){const ar=document.getElementById('arInput').value.trim();const de=document.getElementById('deInput').value.trim();if(!ar)return;const btn=document.getElementById('addBtn');btn.textContent='KI ergänzt...';btn.disabled=true;try{const raw=await AI(`Für das arabische Wort "${ar}" (Deutsch: "${de||'übersetze'}"): NUR JSON: {"arabic":"${ar}","harakat":"mit Vokalzeichen","german":"${de||'übersetze'}","wordType":"Wortart","opposite":"Gegenteil arabisch","plural":"Plural oder -","exampleArabic":"einfacher Satz","exampleGerman":"Übersetzung"}`);const p=pJ(raw);if(p){vocab.unshift({...p,id:Date.now(),status:'neu',interval:1,easeFactor:2.5,repetitions:0,failCount:0,nextReview:Date.now()});closeModal();render()}else{alert('KI Fehler.');btn.textContent='Karte erstellen';btn.disabled=false}}catch(e){alert('Fehler: '+e.message);btn.textContent='Karte erstellen';btn.disabled=false}}
function render(){const app=document.getElementById('app');const nav=document.getElementById('navbar');const due=vocab.filter(isDue).length;
nav.innerHTML=`${['sammlung','lernen','verben','korrektor'].map(t=>`<button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;position:relative" onclick="setTab('${t}')"><span style="font-size:9px;font-weight:600;letter-spacing:0.3px;color:${currentTab===t?'#F59E0B':'#475569'}">${t==='sammlung'?'VOKABELN':t==='lernen'?'LERNEN':t==='verben'?'VERBEN':'KORREKTUR'}</span>${currentTab===t?'<div style="width:16px;height:2px;background:#F59E0B;border-radius:2px;margin-top:2px"></div>':''}${t==='lernen'&&due>0?`<div style="position:absolute;top:0;right:18%;background:#ef4444;color:white;border-radius:50%;width:14px;height:14px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center">${due}</div>`:''}</button>`).join('')}`;
if(currentTab==='sammlung')renderSammlung(app);
else if(currentTab==='lernen')renderLernen(app);
else if(currentTab==='verben')renderVerben(app);
else renderKorrektor(app)}
function setTab(t){currentTab=t;render()}

function renderSammlung(app){const due=vocab.filter(isDue).length;app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase">Arabisch</div><div style="font-size:22px;font-weight:800">Meine Vokabeln</div></div><button class="gold-btn" style="width:auto;padding:10px 18px" onclick="showAddModal()">+ Hinzufügen</button></div>${streakBanner()}${due>0?`<div style="background:linear-gradient(135deg,#1a2f1a,#0d1a0d);border:1px solid #166534;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700;color:#4ade80">Wiederholung fällig</div><div style="font-size:12px;color:#64748b">${due} Karten bereit</div></div><div style="font-size:24px;font-weight:800;color:#4ade80">${due}</div></div>`:''}<input placeholder="Suchen..." oninput="filterVocab(this.value)" style="margin-bottom:14px"/>${vocab.map(v=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;color:#64748b">${v.wordType}</div><div style="font-size:13px;color:#94a3b8;margin-top:2px">${v.german}</div>${v.interval>1?`<div style="font-size:10px;color:#475569;margin-top:3px">in ${v.interval}d</div>`:''}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><span style="background:${v.status==='gelernt'?'#14532d':v.status==='lernend'?'#1e3a5f':'#1a2540'};color:${v.status==='gelernt'?'#4ade80':v.status==='lernend'?'#60a5fa':'#64748b'};border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700">${v.status}</span><div class="ar" style="font-size:26px;color:#F59E0B;font-weight:700">${v.harakat||v.arabic}</div><button onclick="deleteVocab(${v.id})" style="background:#3b1a1a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer">Löschen</button></div></div></div>`).join('')}</div>`}
function filterVocab(q){const list=document.querySelectorAll('#app .card');const filtered=vocab.filter(v=>v.arabic.includes(q)||v.german.toLowerCase().includes(q.toLowerCase()));list.forEach((c,i)=>{c.style.display=vocab[i]&&(vocab[i].arabic.includes(q)||vocab[i].german.toLowerCase().includes(q.toLowerCase()))?'block':'none'})}

function buildPool(f){const base=vocab.filter(v=>f==='fällig'?isDue(v):f==='alle'?true:v.status===f);const pool=[];for(const c of base){const fc=c.failCount||0;const t=fc>=4?4:fc>=3?3:fc>=2?2:1;for(let i=0;i<t;i++)pool.push(c)}return pool.sort(()=>Math.random()-0.5)}
function renderLernen(app){lernPool=buildPool(lernFilter);lernIdx=0;lernFlipped=false;lernStats={p:0,g:0,s:0};lernDone=false;showCard(app)}

if(lernDone){app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 20px;text-align:center"><div style="font-size:22px;font-weight:800;margin-bottom:4px">Session abgeschlossen!</div></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:#a3e635">${lernStats.p}</div><div style="font-size:11px;color:#64748b">Perfekt</div></div><div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:#F59E0B">${lernStats.g}</div><div style="font-size:11px;color:#64748b">Gut</div></div><div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:#ef4444">${lernStats.s}</div><div style="font-size:11px;color:#64748b">Schlecht</div></div></div>${lernStats.s>0?'<div style="background:#1a1000;border:1px solid #92400e;border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:#F59E0B">Schlechte Karten kommen beim nächsten Mal öfter.</div>':''}${streakBanner()}<button class="gold-btn" onclick="setTab(\'lernen\')">Nochmal lernen</button></div>`;return}
if(lernPool.length===0){app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 14px"><div style="font-size:22px;font-weight:800">Lernkarten</div></div><div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">${['fällig','alle','neu','lernend','gelernt'].map(f=>`<button onclick="changeLernFilter('${f}')" style="background:${lernFilter===f?'#F59E0B':'#1a2540'};border:1px solid ${lernFilter===f?'#F59E0B':'#1e2d4a'};color:${lernFilter===f?'#080c14':'#94a3b8'};border-radius:10px;padding:7px 11px;font-weight:700;font-size:11px;cursor:pointer">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}</div><div style="text-align:center;color:#334155;padding:60px 0;font-size:15px">Keine Karten hier.</div></div>`;return}
const card=lernPool[lernIdx];
app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 10px"><div style="font-size:22px;font-weight:800">Lernkarten</div></div><div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px">${['fällig','alle','neu','lernend','gelernt'].map(f=>`<button onclick="changeLernFilter('${f}')" style="background:${lernFilter===f?'#F59E0B':'#1a2540'};border:1px solid ${lernFilter===f?'#F59E0B':'#1e2d4a'};color:${lernFilter===f?'#080c14':'#94a3b8'};border-radius:10px;padding:7px 11px;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}</div><div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:6px"><span>${lernIdx+1} / ${lernPool.length}</span><span>${card.interval||1}d</span></div><div style="background:#1a2540;border-radius:4px;height:4px;margin-bottom:18px"><div style="width:${((lernIdx+1)/lernPool.length)*100}%;background:${(card.failCount||0)>1?'#ef4444':'#F59E0B'};height:4px;border-radius:4px"></div></div><div onclick="flipCard()" style="background:#0d1526;border:1px solid ${(card.failCount||0)>1?'#7f1d1d':'#1e2d4a'};border-radius:18px;padding:18px;min-height:240px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">${!lernFlipped?`${(card.failCount||0)>0?`<div style="font-size:10px;color:#f97316;margin-bottom:8px;font-weight:700">SCHWIERIG – ${card.failCount}x falsch</div>`:''}<div style="font-size:11px;color:#F59E0B;font-weight:700;letter-spacing:1px;margin-bottom:16px">Tippen zum Umdrehen</div><div class="ar" style="font-size:52px;color:#F59E0B;font-weight:700;margin-bottom:8px">${card.harakat||card.arabic}</div><div style="font-size:12px;color:#64748b">${card.wordType}</div>`:`<div style="width:100%"><div style="font-size:22px;font-weight:800;color:#f8fafc;margin-bottom:16px">${card.german}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">${card.opposite&&card.opposite!=='-'?`<div style="background:#1a2540;border-radius:10px;padding:10px"><div style="font-size:10px;color:#64748b;margin-bottom:4px">Gegenteil</div><div class="ar" style="font-size:18px;color:#60a5fa">${card.opposite}</div></div>`:''} ${card.plural&&card.plural!=='-'?`<div style="background:#1a2540;border-radius:10px;padding:10px"><div style="font-size:10px;color:#64748b;margin-bottom:4px">Plural</div><div class="ar" style="font-size:18px;color:#a78bfa">${card.plural}</div></div>`:''}</div>${card.exampleArabic?`<div style="background:#1a2540;border-radius:12px;padding:12px"><div style="font-size:10px;color:#F59E0B;margin-bottom:6px">BEISPIEL</div><div class="ar" style="font-size:18px;color:#f8fafc;margin-bottom:6px">${card.exampleArabic}</div><div style="font-size:12px;color:#64748b">${card.exampleGerman}</div></div>`:''}</div>`}</div>${lernFlipped?`<div style="margin-top:14px"><div style="font-size:12px;color:#64748b;text-align:center;margin-bottom:10px">Wie gut kanntest du das Wort?</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${[{l:'Gar nicht',c:'#ef4444',s:0},{l:'Schlecht',c:'#f97316',s:1},{l:'Okay',c:'#eab308',s:2},{l:'Gut',c:'#84cc16',s:3},{l:'Super',c:'#22c55e',s:4},{l:'Perfekt',c:'#a3e635',s:5}].map(r=>`<button onclick="rateCard(${r.s})" style="background:#1a2540;border:1px solid ${r.c}44;border-radius:12px;padding:12px 6px;cursor:pointer;text-align:center"><div style="font-size:13px;font-weight:800;color:${r.c}">${r.l}</div>${r.s<2?'<div style="font-size:9px;color:#475569;margin-top:2px">öfter</div>':r.s>=4?'<div style="font-size:9px;color:#475569;margin-top:2px">seltener</div>':''}</button>`).join('')}</div></div>`:''}</div>`}
function flipCard(){lernFlipped=!lernFlipped;showCard(document.getElementById('app'))}
function changeLernFilter(f){lernFilter=f;setTab('lernen')}
function rateCard(score){const card=lernPool[lernIdx];const updated=calcNext(card,score);vocab=vocab.map(v=>v.id===card.id?updated:v);if(score>=4)lernStats.p++;else if(score>=2)lernStats.g++;else lernStats.s++;lernIdx++;if(lernIdx>=lernPool.length){lernDone=true;updateStreak()}showCard(document.getElementById('app'))}
function renderVerben(app){app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase">Arabisch</div><div style="font-size:22px;font-weight:800">Verben</div><div style="font-size:12px;color:#64748b">${verbs.length} Verben</div></div><button class="gold-btn" style="width:auto;padding:10px 18px" onclick="showVerbModal()">+ Verb</button></div>${verbs.length===0?'<div style="text-align:center;color:#334155;padding:40px 0">Noch keine Verben.</div>':verbs.map(v=>`<div style="display:flex;margin-bottom:10px"><div class="card" style="flex:1;cursor:pointer;border-radius:18px 0 0 18px;margin-bottom:0;border-right:none" onclick="showVerbDetail(${v.id})"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;color:#94a3b8">${v.german}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="ar" style="font-size:28px;color:#F59E0B;font-weight:700">${v.arabic}</div><div style="color:#F59E0B;font-size:18px">›</div></div></div></div><button onclick="verbs=verbs.filter(x=>x.id!==${v.id});renderVerben(document.getElementById('app'))" style="background:#3b1a1a;border:1px solid #7f1d1d;border-radius:0 18px 18px 0;padding:0 14px;cursor:pointer;color:#fca5a5;font-size:14px">✕</button></div>`).join('')}</div>`}
function showVerbModal(){const m=document.createElement('div');m.id='modal';m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;align-items:flex-end';m.innerHTML=`<div style="background:#0d1526;border:1px solid #1e2d4a;border-radius:24px 24px 0 0;width:100%;padding:24px;max-height:85vh;overflow-y:auto"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div style="font-size:18px;font-weight:800">Verb hinzufügen</div><button onclick="closeModal()" style="background:#1a2540;border:none;color:#94a3b8;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px">✕</button></div><div style="background:#1a2540;border:1px solid #F59E0B33;border-radius:10px;padding:12px;margin-bottom:16px;font-size:11px;color:#F59E0B">KI erstellt alle Konjugationsformen automatisch.</div><input id="vArInput" placeholder="Arabisches Verb..." class="ar" style="font-size:24px;margin-bottom:10px;color:#F59E0B"/><input id="vDeInput" placeholder="Bedeutung (optional)" style="margin-bottom:14px"/><button class="gold-btn" onclick="addVerb()" id="vBtn">Verb erstellen</button></div>`;document.body.appendChild(m)}
async function addVerb(){const ar=document.getElementById('vArInput').value.trim();const de=document.getElementById('vDeInput').value.trim();if(!ar)return;const btn=document.getElementById('vBtn');btn.textContent='KI erstellt Konjugation...';btn.disabled=true;try{const raw=await AI(`Vollständige arabische Konjugationstabelle für Verb "${ar}" (${de||'übersetze'}). NUR JSON: {"arabic":"${ar}","german":"${de||''}","konjugation":{"vergangenheit":[{"pronomen":"هُوَ","arabisch":"","deutsch":""},{"pronomen":"هِيَ","arabisch":"","deutsch":""},{"pronomen":"أَنَا","arabisch":"","deutsch":""},{"pronomen":"نَحْنُ","arabisch":"","deutsch":""},{"pronomen":"أَنْتَ","arabisch":"","deutsch":""},{"pronomen":"أَنْتِ","arabisch":"","deutsch":""}],"gegenwart":[{"pronomen":"هُوَ","arabisch":"","deutsch":""},{"pronomen":"هِيَ","arabisch":"","deutsch":""},{"pronomen":"أَنَا","arabisch":"","deutsch":""},{"pronomen":"نَحْنُ","arabisch":"","deutsch":""},{"pronomen":"أَنْتَ","arabisch":"","deutsch":""},{"pronomen":"أَنْتِ","arabisch":"","deutsch":""}],"zukunft":[{"pronomen":"هُوَ","arabisch":"","deutsch":""},{"pronomen":"هِيَ","arabisch":"","deutsch":""},{"pronomen":"أَنَا","arabisch":"","deutsch":""},{"pronomen":"نَحْنُ","arabisch":"","deutsch":""},{"pronomen":"أَنْتَ","arabisch":"","deutsch":""},{"pronomen":"أَنْتِ","arabisch":"","deutsch":""}],"befehl":[{"pronomen":"أَنْتَ","arabisch":"","deutsch":""},{"pronomen":"أَنْتِ","arabisch":"","deutsch":""}],"beispiele":[{"arabisch":"","deutsch":""},{"arabisch":"","deutsch":""}],"merksatz":"Merksatz"}}`);const p=pJ(raw);if(p){verbs.unshift({...p,id:Date.now()});closeModal();renderVerben(document.getElementById('app'))}else{alert('KI Fehler.');btn.textContent='Verb erstellen';btn.disabled=false}}catch(e){alert('Fehler: '+e.message);btn.textContent='Verb erstellen';btn.disabled=false}}
function showVerbDetail(id){const v=verbs.find(x=>x.id===id);if(!v)return;const tenses=[{key:'vergangenheit',label:'Vergangenheit',color:'#60a5fa'},{key:'gegenwart',label:'Gegenwart',color:'#a3e635'},{key:'zukunft',label:'Zukunft',color:'#F59E0B'},{key:'befehl',label:'Befehl',color:'#f472b6'}];let at='vergangenheit';const m=document.createElement('div');m.id='modal';m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;flex-direction:column';function rd(){const tc=tenses.find(t=>t.key===at);m.innerHTML=`<div style="background:#0d1526;border-bottom:1px solid #1e2d4a;padding:16px 20px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#64748b">VERB</div><div class="ar" style="font-size:28px;color:#F59E0B;font-weight:700">${v.arabic}</div><div style="font-size:13px;color:#94a3b8">${v.german}</div></div><button onclick="closeModal()" style="background:#1a2540;border:none;color:#94a3b8;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:16px">✕</button></div><div style="display:grid;grid-template-columns:repeat(4,1fr);background:#080c14;border-bottom:1px solid #1e2d4a">${tenses.map(t=>`<button onclick="at='${t.key}';rd()" style="background:${at===t.key?'#0d1526':'transparent'};border:none;border-bottom:${at===t.key?`2px solid ${t.color}`:'2px solid transparent'};padding:10px 4px;cursor:pointer"><span style="font-size:9px;font-weight:700;color:${at===t.key?t.color:'#475569'}">${t.label.toUpperCase()}</span></button>`).join('')}</div><div style="flex:1;overflow-y:auto;padding:16px">${(v.konjugation[at]||[]).map(f=>`<div style="background:#0d1526;border:1px solid #1e2d4a;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:11px;color:#64748b">${f.pronomen} · ${f.deutsch}</div><div class="ar" style="font-size:26px;color:${tc.color};font-weight:700">${f.arabisch}</div></div>`).join('')}${v.konjugation.beispiele?.length>0?`<div style="font-size:12px;font-weight:700;color:#f8fafc;margin:20px 0 10px">BEISPIELSÄTZE</div>${v.konjugation.beispiele.map(b=>`<div class="card"><div class="ar" style="font-size:18px;color:#f8fafc;line-height:1.9;margin-bottom:6px">${b.arabisch}</div><div style="font-size:12px;color:#64748b">${b.deutsch}</div></div>`).join('')}`:''}${v.konjugation.merksatz?`<div style="background:linear-gradient(135deg,#1a2a1a,#0d1a10);border:1px solid #166534;border-radius:14px;padding:16px;margin-top:16px"><div style="font-size:12px;font-weight:700;color:#4ade80;margin-bottom:8px">MERKSATZ</div><div style="font-size:13px;color:#a7f3d0;line-height:1.6">${v.konjugation.merksatz}</div></div>`:''}</div>`}rd();document.body.appendChild(m)}
function renderKorrektor(app){app.innerHTML=`<div style="padding:0 16px 100px"><div style="padding:20px 0 16px"><div style="font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase">Arabisch</div><div style="font-size:22px;font-weight:800">Text-Korrektor</div></div><div class="card"><div style="font-size:12px;color:#F59E0B;margin-bottom:8px;font-weight:600">Deinen Text eingeben</div><textarea id="corrInput" placeholder="أكتب نصك هنا..." class="ar" style="font-size:22px;height:120px;resize:none;line-height:1.8"></textarea><button class="gold-btn" style="margin-top:12px" onclick="correctText()">Text korrigieren</button></div><div id="corrResult"></div></div>`}
async function correctText(){const input=document.getElementById('corrInput').value.trim();if(!input)return;const btn=document.querySelector('#app .gold-btn');btn.textContent='KI korrigiert...';btn.disabled=true;try{const raw=await AI(`Korrigiere diesen arabischen Text: "${input}". NUR JSON: {"corrected":"korrigiert mit Harakat","corrections":[{"original":"falsch","fixed":"richtig","explanation":"Erklärung auf Deutsch"}],"level":"A1/A2/B1/B2/C1/C2"}`);const p=pJ(raw);const r=document.getElementById('corrResult');if(p){r.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:700">Ergebnis</div><span style="background:#1a2540;border:1px solid #F59E0B;color:#F59E0B;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700">Niveau: ${p.level}</span></div><div class="card"><div style="font-size:11px;color:#4ade80;margin-bottom:8px;font-weight:700">KORRIGIERTER TEXT</div><div class="ar" style="font-size:22px;color:#f8fafc;line-height:1.9">${p.corrected}</div></div>${p.corrections?.length>0?`<div class="card"><div style="font-size:12px;font-weight:700;color:#f8fafc;margin-bottom:12px">Korrekturen</div>${p.corrections.map(c=>`<div style="border-bottom:1px solid #1e2d4a;padding-bottom:12px;margin-bottom:12px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><span class="ar" style="background:#3b1a1a;color:#ef4444;border-radius:8px;padding:3px 10px;font-size:16px">${c.original}</span><span style="color:#64748b">→</span><span class="ar" style="background:#1a3b1a;color:#4ade80;border-radius:8px;padding:3px 10px;font-size:16px">${c.fixed}</span></div><div style="font-size:12px;color:#94a3b8">${c.explanation}</div></div>`).join('')}</div>`:''}`;btn.textContent='Text korrigieren';btn.disabled=false}else{alert('KI Fehler.');btn.textContent='Text korrigieren';btn.disabled=false}}catch(e){alert('Fehler: '+e.message);btn.textContent='Text korrigieren';btn.disabled=false}}
render();
</script>
