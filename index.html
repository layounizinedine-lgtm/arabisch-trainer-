<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Arabisch Trainer</title>
<meta name="theme-color" content="#080c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="عربي"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#f8fafc;font-family:'Inter',sans-serif;max-width:430px;margin:0 auto;min-height:100vh}
.ar{font-family:'Amiri',serif;direction:rtl;text-align:right}
.card{background:#0d1526;border:1px solid #1e2d4a;border-radius:18px;padding:18px;margin-bottom:10px}
.gold-btn{background:linear-gradient(135deg,#F59E0B,#d97706);border:none;border-radius:12px;color:#080c14;font-weight:800;font-size:14px;padding:13px 0;width:100%;cursor:pointer}
.ghost-btn{background:#1a2540;border:1px solid #1e2d4a;border-radius:10px;color:#94a3b8;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer}
.active-btn{background:#F59E0B;border:1px solid #F59E0B;border-radius:10px;color:#080c14;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer}
input,textarea{background:#1a2540;border:1px solid #1e2d4a;border-radius:12px;color:#f8fafc;padding:12px 14px;font-size:14px;width:100%;box-sizing:border-box;font-family:'Inter',sans-serif}
.badge-neu{background:#1a2540;color:#64748b;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}
.badge-lernend{background:#1e3a5f;color:#60a5fa;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}
.badge-gelernt{background:#14532d;color:#4ade80;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}
#app{padding-bottom:80px}
#topbar{height:3px;background:linear-gradient(90deg,#F59E0B,#d97706,#92400e,#F59E0B)}
#navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0f1e;border-top:1px solid #1e2d4a;display:flex;padding:8px 0 16px;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0}
.nav-label{font-size:9px;font-weight:600;letter-spacing:0.3px}
.nav-dot{width:16px;height:2px;background:#F59E0B;border-radius:2px;margin-top:2px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end}
.modal{background:#0d1526;border:1px solid #1e2d4a;border-radius:24px 24px 0 0;width:100%;padding:24px;max-height:85vh;overflow-y:auto}
.streak-banner{background:linear-gradient(135deg,#1a1a0a,#2a1f00);border:1px solid #92400e;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="app"></div>
<div id="navbar"></div>
<script>
